<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #6200ee; --secondary: #10b981; --danger: #f43f5e; --bg: #050505; }
        
        body {
            background: radial-gradient(circle at top, #1e2030 0%, var(--bg) 100%);
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }

        /* --- TELAS --- */
        #telaInicial, #telaJogo { width: 100%; display: flex; flex-direction: column; align-items: center; }
        #telaJogo { display: none; }

        /* --- MENU INICIAL --- */
        .logo { font-size: 3rem; font-weight: 900; margin-bottom: 5px; letter-spacing: -2px; }
        .sub { color: #666; font-size: 0.8rem; margin-bottom: 40px; letter-spacing: 2px; }
        
        .input-nome { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 15px; border-radius: 12px; width: 250px; 
            text-align: center; font-size: 1rem; margin-bottom: 15px; outline: none;
        }

        .btn-menu {
            width: 280px; padding: 16px; margin: 8px; border-radius: 12px;
            border: none; font-weight: bold; cursor: pointer; font-size: 1rem;
            transition: 0.2s;
        }
        .btn-local { background: #fff; color: #000; }
        .btn-online { background: var(--primary); color: white; }
        
        .credito-footer { margin-top: 50px; font-size: 0.7rem; color: #333; letter-spacing: 1px; }

        /* --- JOGO --- */
        .placar { display: flex; gap: 30px; margin: 20px 0; background: rgba(255,255,255,0.02); padding: 12px 25px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.05); }
        .tabuleiro { display: grid; grid-template-columns: repeat(3, 90px); gap: 10px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .celula { width: 90px; height: 90px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; cursor: pointer; }
        .x-player { color: var(--danger); text-shadow: 0 0 15px var(--danger); }
        .o-player { color: var(--secondary); text-shadow: 0 0 15px var(--secondary); }

        #status { margin-top: 25px; font-weight: bold; font-size: 1rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        /* --- NOTIFICAÇÃO --- */
        #painelPedido {
            position: fixed; top: 20px; background: #1a1c2c; border: 1px solid var(--primary);
            padding: 20px; border-radius: 15px; text-align: center; z-index: 200; display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .impacto-velha { animation: shake 0.4s; background: rgba(100, 0, 0, 0.8) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        
        .assinatura-jogo { position: absolute; bottom: 10px; right: 10px; font-size: 0.6rem; color: #222; }
    </style>
</head>
<body>

    <div id="telaInicial">
        <div class="logo">Jogo da Velha</div>
        <div class="sub">MULTIPLAYER ONLINE</div>

        <input type="text" id="meuNomeInput" class="input-nome" placeholder="Seu nome..." maxlength="12">
        
        <button class="btn-menu btn-local" onclick="iniciarJogo('local')">Duelo Local</button>
        <button class="btn-menu btn-online" onclick="abrirMenuOnline()">Jogar Online</button>
        
        <div id="setupOnline" style="display:none; margin-top:20px;">
            <p style="font-size: 0.8rem; color: #555;">Seu Código: <b id="meuId" style="color:var(--secondary)">...</b></p>
            <input type="text" id="idAmigo" class="input-nome" placeholder="Código do Amigo" style="width: 150px;">
            <button class="btn-menu btn-online" style="background:var(--secondary); width: 180px; padding: 10px;" onclick="conectar()">Convidar</button>
        </div>

        <div class="credito-footer">DESENVOLVIDO POR THALISONDEV</div>
    </div>

    <div id="painelPedido">
        <p id="msgPedido" style="margin-bottom: 15px; font-weight: bold;"></p>
        <button style="background:var(--secondary); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;" onclick="repostaPedido(true)">ACEITAR</button>
        <button style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-left: 10px;" onclick="repostaPedido(false)">RECUSAR</button>
    </div>

    <div id="telaJogo">
        <div class="placar">
            <div class="x-player"><span id="txtNomeX">X</span>: <span id="sX">0</span></div>
            <div class="o-player"><span id="txtNomeO">O</span>: <span id="sO">0</span></div>
        </div>

        <div class="tabuleiro" id="tabuleiro">
            <div class="celula" data-index="0"></div><div class="celula" data-index="1"></div><div class="celula" data-index="2"></div>
            <div class="celula" data-index="3"></div><div class="celula" data-index="4"></div><div class="celula" data-index="5"></div>
            <div class="celula" data-index="6"></div><div class="celula" data-index="7"></div><div class="celula" data-index="8"></div>
        </div>

        <div id="status">Vez de X</div>
        
        <button id="btnNovaPartida" class="btn-menu btn-online" style="width:180px; margin-top:30px; font-size: 0.9rem;" onclick="reset()">Nova Partida</button>
        <button style="background:none; border:none; color:#333; cursor:pointer; margin-top:10px; font-size: 0.7rem;" onclick="location.reload()">Sair</button>

        <div class="assinatura-jogo">ThalisonDev</div>
    </div>

    <script>
        const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
        function tocarSom(f, t, d, v=0.1) {
            try { if (ctxAudio.state === 'suspended') ctxAudio.resume(); const o = ctxAudio.createOscillator(); const g = ctxAudio.createGain(); o.type = t; o.frequency.value = f; g.gain.setValueAtTime(v, ctxAudio.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, ctxAudio.currentTime + d); o.connect(g); g.connect(ctxAudio.destination); o.start(); o.stop(ctxAudio.currentTime + d); } catch(e) {}
        }

        let meuNome = "", nomeInimigo = "Oponente";
        let jAtual = "X", ativo = true, estado = ["","","","","","","","",""];
        let pX = 0, pO = 0, online = false, minhaVez = true, meuSimbolo = "X", conn, tempConn;

        const peer = new Peer(Math.floor(10000 + Math.random() * 90000).toString());
        peer.on('open', id => document.getElementById('meuId').innerText = id);

        peer.on('connection', c => {
            tempConn = c;
            tocarSom(600, 'sine', 0.2);
            const nomeInvasor = c.metadata ? c.metadata.nome : "Alguém";
            document.getElementById('msgPedido').innerText = `${nomeInvasor} quer jogar!`;
            document.getElementById('painelPedido').style.display = 'block';
            nomeInimigo = nomeInvasor;
        });

        function abrirMenuOnline() {
            meuNome = document.getElementById('meuNomeInput').value || "Player 1";
            document.getElementById('setupOnline').style.display = 'block';
        }

        function iniciarJogo(modo) {
            meuNome = document.getElementById('meuNomeInput').value || "Player 1";
            document.getElementById('telaInicial').style.display = 'none';
            document.getElementById('telaJogo').style.display = 'flex';
            
            if(modo === 'local') {
                document.getElementById('txtNomeX').innerText = meuNome;
                document.getElementById('txtNomeO').innerText = "Oponente";
                document.getElementById('btnNovaPartida').style.display = 'block';
            } else {
                document.getElementById('btnNovaPartida').style.display = 'none';
            }
        }

        function repostaPedido(aceitou) {
            document.getElementById('painelPedido').style.display = 'none';
            if(aceitou) {
                conn = tempConn; online = true; meuSimbolo = "X"; minhaVez = true;
                setupConn();
                iniciarJogo('online');
                document.getElementById('txtNomeX').innerText = meuNome;
                document.getElementById('txtNomeO').innerText = nomeInimigo;
                conn.send({t: 'aceito', nome: meuNome});
            } else {
                tempConn.send({t: 'recusado'});
                setTimeout(() => tempConn.close(), 500);
            }
        }

        function conectar() {
            const id = document.getElementById('idAmigo').value;
            if(!id) return;
            conn = peer.connect(id, { metadata: { nome: meuNome } }); 
            setupConn();
            document.getElementById('status').innerText = "Aguardando...";
        }

        function setupConn() {
            conn.on('data', d => { 
                if(d.t==='aceito') { 
                    online = true; meuSimbolo = "O"; minhaVez = false; 
                    nomeInimigo = d.nome;
                    iniciarJogo('online');
                    document.getElementById('txtNomeX').innerText = nomeInimigo;
                    document.getElementById('txtNomeO').innerText = meuNome;
                    document.getElementById('status').innerText = `Vez de ${nomeInimigo}`;
                }
                if(d.t==='recusado') alert("Convite recusado.");
                if(d.t==='j'){ marcar(d.i, meuSimbolo==='X'?'O':'X'); minhaVez=true; document.getElementById('status').innerText="Sua Vez!"; }
                if(d.t==='r') resetLocal();
            });
        }

        document.querySelectorAll('.celula').forEach(c => c.addEventListener('click', e => {
            const i = e.target.dataset.index;
            if(estado[i] !== "" || !ativo || (online && !minhaVez)) return;
            marcar(i, online ? meuSimbolo : jAtual);
            if(online) { conn.send({t:'j', i:i}); minhaVez = false; document.getElementById('status').innerText = `Vez de ${nomeInimigo}`; }
            else { jAtual = jAtual === "X" ? "O" : "X"; document.getElementById('status').innerText = `Vez de ${jAtual}`; }
        }));

        function marcar(i, s) {
            tocarSom(800, 'sine', 0.1);
            estado[i] = s;
            const c = document.querySelectorAll('.celula')[i];
            c.innerText = s; c.classList.add(s === "X" ? "x-player" : "o-player");
            checar();
        }

        function checar() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let p of wins) {
                if(estado[p[0]] && estado[p[0]] === estado[p[1]] && estado[p[0]] === estado[p[2]]) {
                    const v = estado[p[0]] === 'X' ? document.getElementById('txtNomeX').innerText : document.getElementById('txtNomeO').innerText;
                    document.getElementById('status').innerText = `${v} VENCEU!`;
                    tocarSom(500, 'sine', 0.2); confetti(); ativo = false;
                    estado[p[0]] === 'X' ? pX++ : pO++;
                    document.getElementById('sX').innerText = pX; document.getElementById('sO').innerText = pO;
                    if(online) document.getElementById('btnNovaPartida').style.display = 'block'; 
                    return;
                }
            }
            if(!estado.includes("")) { 
                document.getElementById('status').innerText = "EMPATE!"; 
                tocarSom(100, 'sawtooth', 0.4, 0.2); document.getElementById('tabuleiro').classList.add('impacto-velha'); ativo = false; 
                if(online) document.getElementById('btnNovaPartida').style.display = 'block'; 
            }
        }

        function reset() { if(online && conn) conn.send({t:'r'}); resetLocal(); }
        
        function resetLocal() {
            estado.fill(""); ativo = true; jAtual = "X"; minhaVez = (meuSimbolo === "X");
            document.getElementById('tabuleiro').classList.remove('impacto-velha');
            document.querySelectorAll('.celula').forEach(c => { c.innerText = ""; c.className = "celula"; });
            document.getElementById('status').innerText = online ? (minhaVez ? "Sua vez!" : `Vez de ${nomeInimigo}`) : `Vez de X`;
            if(online) document.getElementById('btnNovaPartida').style.display = 'none'; 
        }
    </script>
</body>
</html>
