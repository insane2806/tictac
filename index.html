<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo da Velha - Neon Galaxy Cloud</title>
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-red: #ff2a6d; --neon-cyan: #05d9e8; --neon-purple: #9d4edd; --neon-green: #00ff7f; --neon-yellow: #f1c40f; --bg-dark: #020205; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { color: white; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; height: 100svh; overflow: hidden; position: relative; background-color: var(--bg-dark); transition: background-color 0.1s; }

        /* BRILHOS E ANIMAÇÕES BASE */
        .flash-red { animation: flashShock 0.4s ease-in-out; } @keyframes flashShock { 0%, 100% { background-color: transparent; } 20% { background-color: rgba(255, 42, 109, 0.3); } 60% { background-color: rgba(255, 42, 109, 0.4); } }
        .flash-win-x { animation: flashWinX 0.6s ease-out; } @keyframes flashWinX { 0%, 100% { background-color: transparent; } 20% { background-color: color-mix(in srgb, var(--neon-red) 25%, transparent); } }
        .flash-win-o { animation: flashWinO 0.6s ease-out; } @keyframes flashWinO { 0%, 100% { background-color: transparent; } 20% { background-color: color-mix(in srgb, var(--neon-cyan) 25%, transparent); } }

        .background-animated { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; background: radial-gradient(circle at 15% 20%, rgba(15, 6, 35, 0.8) 0%, transparent 40%), radial-gradient(circle at 85% 80%, rgba(6, 19, 35, 0.8) 0%, transparent 40%), #020205; overflow: hidden; }
        .background-animated::before { content: ''; position: absolute; top: -100%; left: -100%; right: -100%; bottom: -100%; background-image: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.3) 2px, transparent 4px), radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.2) 1.5px, transparent 3px); background-size: 300px 300px, 200px 200px; opacity: 0.7; animation: moveStars 40s linear infinite; }
        @keyframes moveStars { from { transform: translateY(0) translateX(0); } to { transform: translateY(300px) translateX(150px); } }

        /* UI GLOBAL */
        .btn-top-corner, .btn-top-corner-2 { position: absolute; top: 12px; background: rgba(5, 5, 10, 0.6); border: 1px solid var(--neon-cyan); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 10px rgba(5, 217, 232, 0.3); z-index: 100; transition: 0.3s; }
        .btn-top-corner { right: 15px; } .btn-top-corner-2 { right: 60px; }
        .btn-top-corner:hover, .btn-top-corner-2:hover { background: rgba(5, 217, 232, 0.2); box-shadow: 0 0 15px var(--neon-cyan); transform: scale(1.05); }
        .icone-som { width: 18px; height: 18px; fill: var(--neon-cyan); }

        #telaLogin, #telaInicial, #telaJogo { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; text-align: center; position: absolute; }
        .logo-container { margin-bottom: 40px; position: relative; text-align: center; }
        .logo { font-size: 4.5rem; font-weight: 900; font-style: italic; letter-spacing: -3px; color: white; text-shadow: 0 0 15px rgba(255,255,255,0.9), 0 0 25px var(--neon-cyan); display: flex; align-items: center; justify-content: center; }
        .sub { color: var(--neon-cyan); font-size: 0.8rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 700; border: 1.5px solid var(--neon-cyan); border-radius: 20px; padding: 6px 18px; display: inline-block; margin-top: -12px; background: rgba(0, 0, 0, 0.6); }

        .profile-card { background: linear-gradient(135deg, rgba(20,20,35,0.8), rgba(5,5,15,0.9)); border: 2px solid var(--neon-cyan); border-radius: 20px; padding: 20px; width: 300px; margin-bottom: 25px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 0 20px rgba(5, 217, 232, 0.3); backdrop-filter: blur(10px); }
        .profile-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .profile-name { font-weight: 900; font-size: 1rem; color: white; text-transform: uppercase; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .profile-id-badge { background: rgba(5, 217, 232, 0.15); color: var(--neon-cyan); padding: 4px 8px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; border: 1px solid var(--neon-cyan); }
        .rank-value { font-size: 1.4rem; font-weight: 900; text-shadow: 0 0 12px currentColor; }
        .pdl-value { font-size: 0.8rem; color: #ddd; font-weight: bold; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); }

        /* BOTÕES E INPUTS */
        #botoesMenu { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; gap: 15px; }
        .btn-menu { width: 300px; padding: 18px; border-radius: 40px; border: none; font-weight: 700; cursor: pointer; font-size: 1.1rem; transition: 0.4s; text-transform: uppercase; letter-spacing: 2px; color: white; }
        .btn-menu:hover { transform: scale(1.03); }
        .btn-local { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.25); }
        .btn-online { background: linear-gradient(90deg, #3d0a6b, #8a2be2, #3d0a6b); border: 2px solid var(--neon-purple); box-shadow: 0 0 20px var(--neon-purple); }
        .btn-ia { background: linear-gradient(90deg, #002244, #05d9e8, #002244); border: 2px solid var(--neon-cyan); box-shadow: 0 0 20px var(--neon-cyan); }
        .input-nome { background: rgba(0,0,0,0.7); border: 1.5px solid rgba(255,255,255,0.15); color: white; padding: 18px; border-radius: 40px; width: 300px; text-align: center; font-size: 1rem; outline: none; margin-bottom: 15px; transition: 0.3s; }
        .input-nome:focus { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(5, 217, 232, 0.4); }
        .erro-input { color: var(--neon-red); font-size: 0.8rem; margin-bottom: 15px; display: none; font-weight: bold; text-shadow: 0 0 10px var(--neon-red); }

        /* SOCIAL HUB (NOVO) */
        .friend-card { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15); border-radius: 15px; padding: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; transition: 0.3s; width: 100%; }
        .friend-card:hover { border-color: var(--neon-purple); box-shadow: 0 0 10px rgba(157, 78, 221, 0.3); }
        .friend-info { display: flex; flex-direction: column; align-items: flex-start; flex-grow: 1; margin-left: 10px; overflow: hidden;}
        .friend-name { font-weight: bold; color: white; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;}
        .friend-id { font-size: 0.65rem; color: var(--neon-cyan); }
        .friend-actions { display: flex; gap: 6px; }
        .btn-icon { background: none; border: none; font-size: 1.2rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.05); }
        .btn-icon:hover { background: rgba(255,255,255,0.15); transform: scale(1.1); }
        .btn-chat { color: #00ff7f; } .btn-edit { color: #f1c40f; } .btn-trash { color: #ff2a6d; }
        #listaDeAmigosContainer { display: flex; flex-direction: column; width: 320px; max-height: 35vh; overflow-y: auto; padding: 5px; margin-bottom: 15px; }
        #listaDeAmigosContainer::-webkit-scrollbar { width: 4px; } #listaDeAmigosContainer::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 5px; }

        /* CHAT MODAL (NOVO) */
        #modalChat { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(5px); animation: fadeIn 0.3s; }
        .chat-container { background: rgba(10,10,20,0.95); border: 2px solid var(--neon-purple); border-radius: 20px; width: 340px; height: 500px; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(157, 78, 221, 0.4); }
        .chat-header { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; background: rgba(157, 78, 221, 0.1); border-top-left-radius: 18px; border-top-right-radius: 18px; }
        .chat-header h3 { color: white; font-size: 1rem; margin: 0; display: flex; flex-direction: column; text-align: left; }
        .chat-header h3 span { font-size: 0.7rem; color: var(--neon-cyan); font-weight: normal; }
        .chat-messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-messages::-webkit-scrollbar { width: 4px; } .chat-messages::-webkit-scrollbar-thumb { background: var(--neon-cyan); }
        .msg-bubble { max-width: 80%; padding: 8px 12px; border-radius: 15px; font-size: 0.85rem; word-wrap: break-word; }
        .msg-mine { background: var(--neon-purple); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-theirs { background: rgba(255,255,255,0.1); color: white; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.2); }
        .chat-input-area { padding: 10px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 8px; align-items: center; }
        .chat-input { flex-grow: 1; background: rgba(0,0,0,0.5); border: 1px solid var(--neon-purple); border-radius: 20px; color: white; padding: 10px 15px; outline: none; }
        .chat-send-btn { background: var(--neon-purple); border: none; border-radius: 50%; width: 38px; height: 38px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: white; }
        .chat-action-bar { padding: 10px; display: flex; justify-content: center; }
        .btn-desafiar-chat { background: linear-gradient(90deg, #ff2a6d, #9d4edd); border: none; padding: 10px 20px; border-radius: 20px; color: white; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; box-shadow: 0 0 10px rgba(255, 42, 109, 0.4); }

        /* MODAIS GERAIS */
        #modalConvite, #modalAviso { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; justify-content: center; align-items: center; backdrop-filter: blur(8px); animation: fadeIn 0.3s; }
        .modal-content { background: rgba(10,10,20,0.95); border: 2px solid var(--neon-cyan); padding: 30px; border-radius: 25px; text-align: center; box-shadow: 0 0 40px rgba(5,217,232,0.3); max-width: 90%; width: 320px; }
        .btn-aceitar { background: linear-gradient(90deg, #004d26, #00ff7f, #004d26); border-color: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); width: 100%; margin-bottom: 10px; color: black; padding: 15px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        .btn-recusar { background: linear-gradient(90deg, #4d0015, #ff2a6d, #4d0015); border-color: var(--neon-red); box-shadow: 0 0 15px var(--neon-red); width: 100%; padding: 15px; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; border: 1px solid; }

        /* OUTRAS TELAS MANTIDAS */
        #setupOnlineMenu, #setupAmigos, #setupGlobal, #setupLocal, #setupIA, #setupSkins { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .tabuleiro { display: grid; grid-template-columns: repeat(3, 95px); gap: 5px; background: color-mix(in srgb, var(--neon-cyan) 15%, transparent); padding: 5px; border-radius: 22px; border: 2.5px solid var(--neon-cyan); box-shadow: 0 0 20px color-mix(in srgb, var(--neon-cyan) 40%, transparent); position: relative; transition: 0.3s; }
        .celula { width: 95px; height: 95px; background: #05060a; display: flex; align-items: center; justify-content: center; font-size: 3.8rem; font-weight: 900; cursor: pointer; transition: 0.2s; position: relative; }
        .celula[data-index="0"] { border-top-left-radius: 18px; } .celula[data-index="2"] { border-top-right-radius: 18px; } .celula[data-index="6"] { border-bottom-left-radius: 18px; } .celula[data-index="8"] { border-bottom-right-radius: 18px; }
        .x-player { color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red); } .o-player { color: var(--neon-cyan); text-shadow: 0 0 15px var(--neon-cyan); }
        .placar { display: flex; gap: 35px; margin-bottom: 45px; background: rgba(5, 5, 10, 0.9); padding: 12px 35px; border-radius: 50px; border: 1.5px solid rgba(255,255,255,0.08); font-weight: 700; align-items: center; }
        #status { margin-top: 35px; font-weight: 700; font-size: 1.2rem; color: #fff; text-transform: uppercase; letter-spacing: 3px; text-align: center; }
        .btn-texto { background: none; border: none; color: #aaa; margin-top: 18px; cursor: pointer; font-family: inherit; font-size: 0.95rem; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .loader-global { margin: 20px 0; width: 40px; height: 40px; border: 4px solid rgba(5, 217, 232, 0.2); border-left-color: var(--neon-cyan); border-radius: 50%; animation: spin 1s linear infinite; } @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="background-animated"></div> 

    <div id="telaLogin">
        <div class="logo-container"> <div class="logo">Tic<span>Tac</span></div> <div class="sub">LOGIN CLOUD</div> </div>
        <input type="email" id="emailLogin" class="input-nome" placeholder="Seu E-mail">
        <input type="password" id="senhaLogin" class="input-nome" placeholder="Sua Senha">
        <p id="erroLogin" class="erro-input"></p>
        <button class="btn-menu btn-online" onclick="entrarConta()" style="margin-bottom: 15px;">ENTRAR</button>
        <button class="btn-menu btn-local" onclick="criarConta()" style="margin-bottom: 15px;">CRIAR CONTA</button>
        <button class="btn-texto" onclick="entrarComoConvidado()">Entrar como Convidado</button>
    </div>

    <div id="modalConvite">
        <div class="modal-content">
            <h3 id="tituloConvite" style="color:var(--neon-cyan); margin-bottom:10px; text-transform:uppercase; letter-spacing:2px;">Alerta!</h3>
            <p id="textoConvite" style="margin-bottom:20px; color:#ddd; font-weight: bold;">Alguém quer interagir.</p>
            <button class="btn-aceitar" id="btnAccConvite">ACEITAR</button>
            <button class="btn-recusar" id="btnRejConvite" onclick="recusarModal()">RECUSAR</button>
        </div>
    </div>

    <div id="modalAviso">
        <div class="modal-content">
            <p id="textoAviso" style="margin-bottom:20px; color:white; font-weight: bold;"></p>
            <button class="btn-aceitar" onclick="document.getElementById('modalAviso').style.display='none'" style="background: var(--neon-purple); border:none; box-shadow: none; color:white;">OK</button>
        </div>
    </div>

    <div id="modalChat">
        <div class="chat-container">
            <div class="chat-header">
                <h3><span id="chatTitleName">Nome</span><span id="chatTitleId">ID: 00000</span></h3>
                <button onclick="fecharChat()" class="btn-icon" style="color:white; font-size:1rem;">X</button>
            </div>
            <div class="chat-messages" id="chatMsgContainer"></div>
            <div class="chat-action-bar">
                <button onclick="desafiarDoChat()" class="btn-desafiar-chat">⚔️ DESAFIAR PARA PARTIDA</button>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="Digite aqui..." onkeypress="if(event.key === 'Enter') enviarMsgChat()">
                <button class="chat-send-btn" onclick="enviarMsgChat()">➤</button>
            </div>
        </div>
    </div>

    <audio id="musicaFundo" loop preload="auto"><source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=cyberpunk-2099-10701.mp3" type="audio/mpeg"></audio>

    <div id="telaInicial">
        <div class="logo-container"> <div class="logo">Tic<span>Tac</span></div> <div class="sub">Jogo da Velha</div> </div>
        
        <div id="botoesMenu">
            <button class="btn-menu btn-local" onclick="mostrarSetup('local')">Duelo Local</button>
            <button class="btn-menu btn-online" onclick="mostrarSetup('onlineMenu')">Jogar Online</button>
            <button class="btn-menu btn-loja" onclick="mostrarSetup('skins')">🛒 Loja de Skins</button>
            <button class="btn-menu btn-ia" onclick="mostrarSetup('ia')">Jogador vs Máquina</button>
            <button class="btn-texto" onclick="sairDaConta()" style="color: var(--neon-red);">Sair (Logout)</button>
        </div>
        
        <div id="setupOnlineMenu">
            <div class="profile-card">
                <div class="profile-header">
                    <span class="profile-name" id="displayNomePerfil">JOGADOR</span>
                    <span class="profile-id-badge">ID: <span id="meuId">...</span></span>
                </div>
                <div class="profile-rank-area">
                    <span id="txtRank" class="rank-value" style="color: var(--neon-yellow);">🥈 PRATA</span>
                    <span id="txtElo" class="pdl-value">1000 PDL</span>
                </div>
            </div>
            <input type="text" id="nomeOnlineGeral" class="input-nome" placeholder="Alterar Apelido" maxlength="10">
            <button class="btn-menu btn-ia" onclick="abrirGlobal()" style="margin-bottom:15px;">🌍 Partida Global</button>
            <button class="btn-menu btn-online" onclick="abrirAmigosHub()">👥 Central de Amigos</button>
            <button class="btn-texto" onclick="voltarMenu()">Voltar</button>
        </div>

        <div id="setupAmigos">
            <h3 style="color:var(--neon-purple); margin-bottom: 15px; text-transform:uppercase; letter-spacing:2px;">Lista de Contatos</h3>
            <div style="display:flex; gap:10px; margin-bottom: 10px; width: 320px;">
                <input type="number" id="inputAddAmigo" class="input-nome" placeholder="ID do Amigo" style="width: 100%; margin-bottom:0;" inputmode="numeric">
                <button class="btn-menu btn-online" style="width: auto; padding: 0 25px; margin-bottom:0; font-size:0.9rem;" onclick="enviarPedidoAmizade()">ADD</button>
            </div>
            <button class="btn-texto" onclick="gerarLinkConvite()" style="margin-top:0; margin-bottom:15px; color:var(--neon-green);">🔗 ou Enviar Link de Convite</button>
            
            <div id="listaDeAmigosContainer"></div>
            <button class="btn-texto" onclick="mostrarSetup('onlineMenu')">Voltar</button>
        </div>

        <div id="setupGlobal">
            <h3 id="statusGlobal" style="color:var(--neon-cyan); text-transform:uppercase; letter-spacing:2px; text-shadow: 0 0 10px var(--neon-cyan); text-align:center;">Procurando Partida...</h3>
            <div class="loader-global"></div>
            <button class="btn-menu btn-recusar" style="width:200px;" onclick="cancelarGlobal()">Cancelar</button>
        </div>

        <div id="setupIA">
            <input type="text" id="nomeJogadorIA" class="input-nome" placeholder="Seu Apelido" maxlength="10">
            <button class="btn-menu btn-noob" onclick="setDificuldade('noob')">NOOB</button>
            <button class="btn-menu btn-mestre" onclick="setDificuldade('mestre')">MESTRE</button>
            <button class="btn-menu btn-ultra" onclick="setDificuldade('ultra')">ULTRA INSTINTO</button>
            <button class="btn-texto" onclick="voltarMenu()">Voltar</button>
        </div>

        <div id="setupLocal">
            <input type="text" id="nomeLocalX" class="input-nome" placeholder="Jogador X" maxlength="10">
            <input type="text" id="nomeLocalO" class="input-nome" placeholder="Jogador O" maxlength="10">
            <button class="btn-menu btn-online" onclick="iniciarJogo('local')">Começar Partida</button>
            <button class="btn-texto" onclick="voltarMenu()">Voltar</button>
        </div>

        <div id="setupSkins">
            <h3 style="color:var(--neon-yellow); margin-bottom: 20px; text-transform:uppercase; letter-spacing:2px;">SKINS PREMIUM</h3>
            <div id="listaSkins"></div>
            <button class="btn-texto" onclick="voltarMenu()">Voltar</button>
        </div>
    </div>
    
    <div id="telaJogo">
        <div class="placar">
            <div class="x-player"><span id="txtNomeX">X</span> <span id="sX">0</span></div>
            <div style="color: #444;">|</div>
            <div class="o-player"><span id="txtNomeO">O</span> <span id="sO">0</span></div>
        </div>
        <div class="tabuleiro" id="tabuleiro">
            <div class="celula" data-index="0"></div><div class="celula" data-index="1"></div><div class="celula" data-index="2"></div>
            <div class="celula" data-index="3"></div><div class="celula" data-index="4"></div><div class="celula" data-index="5"></div>
            <div class="celula" data-index="6"></div><div class="celula" data-index="7"></div><div class="celula" data-index="8"></div>
        </div>
        <div id="status">Sua Vez</div>
        <button id="btnNovaPartida" class="btn-menu btn-online" style="display:none; width: auto; padding: 12px 30px; margin-top:20px;" onclick="reset()">Nova Partida</button>
        <button class="btn-texto" style="margin-top:25px;" onclick="sairDaPartida()">Abandonar Partida</button>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = { apiKey: "AIzaSyDv64s-6JctziIGcyDfogeVJHnvGf6pDRc", authDomain: "jogo-da-velha-000.firebaseapp.com", projectId: "jogo-da-velha-000", storageBucket: "jogo-da-velha-000.firebasestorage.app", messagingSenderId: "175809267928", appId: "1:175809267928:web:7d18bbd870a82482daafad", measurementId: "G-F2NSRKELGL" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth();

        let meuIDOriginal = "", peer, connGame = null, online = false, minhaVez = false, meuSimbolo = "X", estado = ["","","","","","","","",""], ativo = true, pX=0, pO=0, nomeX="X", nomeO="O", jAtual="X", contraIA=false, dificuldadeIA='ultra';
        let buscandoGlobal = false, globalRoomIndex = 1, salaGlobalAlvo = "";
        let tempOpData = null, tempOpConn = null; // Guarda dados de quem mandou pedido
        let currentChatId = null;

        // LOGIN & ID
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none'; document.getElementById('telaInicial').style.display = 'flex';
                let hash = 0; for (let i = 0; i < user.uid.length; i++) hash = user.uid.charCodeAt(i) + ((hash << 5) - hash);
                meuIDOriginal = Math.abs(hash % 90000 + 10000).toString(); document.getElementById('meuId').innerText = meuIDOriginal;
                if (peer) { peer.destroy(); setTimeout(() => { iniciarPeer(meuIDOriginal); }, 500); } else { iniciarPeer(meuIDOriginal); }
                let nomePadrao = user.isAnonymous ? "Convidado" : user.email.split('@')[0];
                document.getElementById('nomeOnlineGeral').value = nomePadrao; document.getElementById('displayNomePerfil').innerText = nomePadrao;
                document.getElementById('nomeOnlineGeral').addEventListener('input', (e) => { document.getElementById('displayNomePerfil').innerText = e.target.value.trim() || "JOGADOR"; });
            } else { document.getElementById('telaLogin').style.display = 'flex'; document.getElementById('telaInicial').style.display = 'none'; if (peer) peer.destroy(); }
        });

        function entrarComoConvidado() { auth.signInAnonymously().catch(()=>alert("Erro de conexão")); }
        function criarConta() { const e = document.getElementById('emailLogin').value, s = document.getElementById('senhaLogin').value; auth.createUserWithEmailAndPassword(e, s).catch(err=>alert(err.message)); }
        function entrarConta() { const e = document.getElementById('emailLogin').value, s = document.getElementById('senhaLogin').value; auth.signInWithEmailAndPassword(e, s).catch(()=>alert("Credenciais inválidas")); }
        function sairDaConta() { auth.signOut(); }

        // MÉTODOS AUXILIARES UI
        function mostrarSetup(m) {
            ['botoesMenu','setupLocal','setupOnlineMenu','setupAmigos','setupGlobal','setupIA','setupSkins'].forEach(id => document.getElementById(id).style.display = 'none');
            if(m === 'local') document.getElementById('setupLocal').style.display = 'flex'; else if(m === 'onlineMenu') document.getElementById('setupOnlineMenu').style.display = 'flex'; else if(m === 'amigos') document.getElementById('setupAmigos').style.display = 'flex'; else if(m === 'global') document.getElementById('setupGlobal').style.display = 'flex'; else if(m === 'ia') document.getElementById('setupIA').style.display = 'flex'; else if(m === 'skins') document.getElementById('setupSkins').style.display = 'flex'; else if(m === 'menuPrincipal') document.getElementById('botoesMenu').style.display = 'flex';
        }
        function voltarMenu() { mostrarSetup('menuPrincipal'); }
        function mostrarAviso(msg) { document.getElementById('textoAviso').innerText = msg; document.getElementById('modalAviso').style.display = 'flex'; }
        function recusarModal() { document.getElementById('modalConvite').style.display='none'; if(tempOpConn && tempOpConn.open) { tempOpConn.send({t:'rej'}); setTimeout(()=>tempOpConn.close(), 500); } tempOpConn=null; }

        // PEERJS CORE (Gerencia Jogo, Social e Global)
        function iniciarPeer(idToUse) {
            peer = new Peer(idToUse);
            peer.on('connection', c => {
                c.on('data', d => {
                    // Recebeu Pedido de Amizade
                    if (d.t === 'friend_req') {
                        if(online || contraIA) { c.send({t:'rej_ocupado'}); return; } // Não incomoda no jogo
                        tempOpConn = c; tempOpData = d;
                        document.getElementById('tituloConvite').innerText = "Novo Amigo!"; document.getElementById('tituloConvite').style.color = "var(--neon-purple)";
                        document.getElementById('textoConvite').innerText = `${d.nome} quer te adicionar.`;
                        document.getElementById('btnAccConvite').onclick = aceitarPedidoAmizade;
                        document.getElementById('modalConvite').style.display = 'flex';
                    }
                    // Recebeu Aceitação de Amizade
                    else if (d.t === 'friend_acc') {
                        salvarAmigoDB(d.id, d.nome); renderizarAmigos(); mostrarAviso(`${d.nome} aceitou seu pedido!`);
                    }
                    // Recebeu Mensagem de Chat
                    else if (d.t === 'chat_msg') {
                        salvarMsgLocal(d.id, { sender: 'theirs', msg: d.msg });
                        if(currentChatId === d.id && document.getElementById('modalChat').style.display === 'flex') renderizarChat();
                        else mostrarAviso(`Nova mensagem de ${d.nome}`); // Notificação se o chat estiver fechado
                    }
                    // Recebeu Desafio de Jogo
                    else if(d.t === 'game_req') {
                        if(online || contraIA || buscandoGlobal) { c.send({t:'rej_ocupado'}); return; }
                        tempOpConn = c; tempOpData = d;
                        document.getElementById('tituloConvite').innerText = "Desafio!"; document.getElementById('tituloConvite').style.color = "var(--neon-red)";
                        document.getElementById('textoConvite').innerText = `${d.nome} quer jogar com você.`;
                        document.getElementById('btnAccConvite').onclick = aceitarDesafioJogo;
                        document.getElementById('modalConvite').style.display = 'flex';
                    }
                    // Retornos de recusa
                    else if(d.t === 'rej' || d.t === 'rej_ocupado') { mostrarAviso(d.t === 'rej_ocupado' ? "O jogador está ocupado." : "Pedido recusado."); }
                    
                    // Matchmaking Global
                    else if(d.t === 'req_global' && buscandoGlobal) {
                        connGame = c; nomeO = d.nome || "Oponente"; nomeX = document.getElementById('nomeOnlineGeral').value.trim();
                        connGame.send({t: 'acc_global', nome: nomeX});
                        online = true; contraIA = false; meuSimbolo = "X"; minhaVez = true; buscandoGlobal = false;
                        document.getElementById('statusGlobal').innerText = "PARTIDA ENCONTRADA!";
                        setTimeout(() => { setupConnGame(); iniciarJogo('online'); }, 800);
                    }
                });
            });
            peer.on('error', err => { if(err.type === 'peer-unavailable') { if(buscandoGlobal) { peer.destroy(); setTimeout(() => { iniciarPeer(salaGlobalAlvo); }, 500); } else mostrarAviso("Jogador Offline ou não encontrado!"); } else if(err.type==='unavailable-id' && buscandoGlobal) buscarOponenteGlobal(); });
        }

        // SOCIAL HUB FUNCTIONS
        function getAmigosDB() { return JSON.parse(localStorage.getItem('ticTacAmigos_v2')) || []; }
        function salvarAmigoDB(id, nome) { let am = getAmigosDB(); if(!am.some(a=>a.id===id)) { am.push({id: id, nomeO: nome, nomeC: nome, chat: []}); localStorage.setItem('ticTacAmigos_v2', JSON.stringify(am)); } }
        
        function abrirAmigosHub() { const n = document.getElementById('nomeOnlineGeral').value.trim(); if(!n) { document.getElementById('erroNomeGeral').style.display='block'; return;} renderizarAmigos(); mostrarSetup('amigos'); }

        function enviarPedidoAmizade() {
            const id = document.getElementById('inputAddAmigo').value.trim(); const meuNome = document.getElementById('nomeOnlineGeral').value.trim();
            if(id.length < 5 || id === meuIDOriginal) { mostrarAviso("ID Inválido!"); return; }
            if(getAmigosDB().some(a=>a.id === id)) { mostrarAviso("Já é seu amigo!"); return; }
            
            let tc = peer.connect(id);
            tc.on('open', () => { tc.send({t: 'friend_req', id: meuIDOriginal, nome: meuNome}); mostrarAviso("Pedido Enviado!"); setTimeout(()=>tc.close(),2000); });
            document.getElementById('inputAddAmigo').value = "";
        }

        function aceitarPedidoAmizade() {
            salvarAmigoDB(tempOpData.id, tempOpData.nome); renderizarAmigos();
            if(tempOpConn && tempOpConn.open) { tempOpConn.send({t: 'friend_acc', id: meuIDOriginal, nome: document.getElementById('nomeOnlineGeral').value.trim()}); setTimeout(()=>tempOpConn.close(),500); }
            document.getElementById('modalConvite').style.display='none'; tempOpConn = null;
        }

        function renderizarAmigos() {
            const container = document.getElementById('listaDeAmigosContainer'); let amigos = getAmigosDB(); container.innerHTML = '';
            if(amigos.length === 0) { container.innerHTML = '<p style="color:#aaa; font-size:0.85rem; margin-top:10px;">Lista vazia. Adicione amigos acima!</p>'; return; }
            
            amigos.forEach(a => {
                const div = document.createElement('div'); div.className = 'friend-card';
                div.innerHTML = `
                    <div class="friend-info">
                        <span class="friend-name">${a.nomeC}</span>
                        <span class="friend-id">ID: ${a.id}</span>
                    </div>
                    <div class="friend-actions">
                        <button class="btn-icon btn-chat" onclick="abrirChat('${a.id}')" title="Chat">💬</button>
                        <button class="btn-icon btn-edit" onclick="renomearAmigo('${a.id}')" title="Renomear">✏️</button>
                        <button class="btn-icon btn-trash" onclick="removerAmigo('${a.id}')" title="Excluir">🗑️</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function removerAmigo(id) { if(confirm("Remover este amigo?")) { let am = getAmigosDB().filter(a=>a.id !== id); localStorage.setItem('ticTacAmigos_v2', JSON.stringify(am)); renderizarAmigos(); } }
        function renomearAmigo(id) { let am = getAmigosDB(); let idx = am.findIndex(a=>a.id === id); if(idx>-1) { let nn = prompt("Digite o novo nome (Apelido):", am[idx].nomeC); if(nn && nn.trim()!=="") { am[idx].nomeC = nn.trim(); localStorage.setItem('ticTacAmigos_v2', JSON.stringify(am)); renderizarAmigos(); } } }

        // CHAT FUNCTIONS
        function abrirChat(id) {
            currentChatId = id; let amigo = getAmigosDB().find(a=>a.id===id);
            document.getElementById('chatTitleName').innerText = amigo.nomeC; document.getElementById('chatTitleId').innerText = "ID: " + amigo.id;
            renderizarChat(); document.getElementById('modalChat').style.display = 'flex';
        }
        function fecharChat() { document.getElementById('modalChat').style.display = 'none'; currentChatId = null; }
        
        function salvarMsgLocal(id, msgObj) {
            let am = getAmigosDB(); let idx = am.findIndex(a=>a.id===id);
            if(idx>-1) { am[idx].chat.push(msgObj); if(am[idx].chat.length > 20) am[idx].chat.shift(); localStorage.setItem('ticTacAmigos_v2', JSON.stringify(am)); }
        }

        function renderizarChat() {
            if(!currentChatId) return;
            const container = document.getElementById('chatMsgContainer'); container.innerHTML = '';
            let amigo = getAmigosDB().find(a=>a.id===currentChatId);
            if(!amigo || !amigo.chat || amigo.chat.length === 0) { container.innerHTML = '<p style="text-align:center; color:#555; margin-top:20px; font-size:0.8rem;">Diga Oi!</p>'; return; }
            
            amigo.chat.forEach(c => {
                const b = document.createElement('div'); b.className = 'msg-bubble ' + (c.sender === 'mine' ? 'msg-mine' : 'msg-theirs');
                b.innerText = c.msg; container.appendChild(b);
            });
            container.scrollTop = container.scrollHeight;
        }

        function enviarMsgChat() {
            const inp = document.getElementById('chatInput'); const txt = inp.value.trim(); if(!txt || !currentChatId) return;
            const meuNome = document.getElementById('nomeOnlineGeral').value.trim();
            
            let tc = peer.connect(currentChatId);
            tc.on('open', () => {
                tc.send({t: 'chat_msg', id: meuIDOriginal, nome: meuNome, msg: txt});
                salvarMsgLocal(currentChatId, {sender: 'mine', msg: txt});
                inp.value = ''; renderizarChat();
                setTimeout(()=>tc.close(), 1000);
            });
            tc.on('error', () => { mostrarAviso("Amigo offline."); });
        }

        // DESAFIO GAME P2P (A partir do Social)
        function desafiarDoChat() { if(!currentChatId) return; enviarDesafio(currentChatId); fecharChat(); }
        function enviarDesafio(idAlvo) {
            const meuNome = document.getElementById('nomeOnlineGeral').value.trim();
            mostrarAviso("Enviando Desafio...");
            let temp = peer.connect(idAlvo);
            temp.on('open', () => {
                document.getElementById('modalAviso').style.display='none'; // Fecha aviso de enviando
                temp.send({t: 'game_req', id: meuIDOriginal, nome: meuNome});
                temp.on('data', d => {
                    if(d.t === 'acc') {
                        nomeX = meuNome; nomeO = d.nome || "Adversário";
                        online = true; contraIA = false; meuSimbolo = "X"; minhaVez = true; connGame = temp;
                        setupConnGame(); iniciarJogo('online');
                    } else if (d.t === 'rej' || d.t === 'rej_ocupado') { mostrarAviso(d.t === 'rej_ocupado' ? "Jogador Ocupado!" : "Desafio Recusado!"); temp.close(); }
                });
            });
            temp.on('error', () => mostrarAviso("Amigo Offline."));
        }

        function aceitarDesafioJogo() {
            let meuNome = document.getElementById('nomeOnlineGeral').value.trim();
            document.getElementById('modalConvite').style.display = 'none';
            connGame = tempOpConn; nomeO = meuNome; nomeX = tempOpData.nome;
            connGame.send({t: 'acc', nome: nomeO});
            online = true; contraIA = false; meuSimbolo = "O"; minhaVez = false; tempOpConn = null;
            setupConnGame(); iniciarJogo('online');
        }

        // GAME LOGIC GLOBAL & IN-GAME
        function abrirGlobal() { const n = document.getElementById('nomeOnlineGeral').value.trim(); if(!n){document.getElementById('erroNomeGeral').style.display='block'; return;} buscandoGlobal=true; globalRoomIndex=1; mostrarSetup('global'); buscarOponenteGlobal(); }
        function buscarOponenteGlobal() {
            if(!buscandoGlobal) return; document.getElementById('statusGlobal').innerText = `Procurando... (${globalRoomIndex})`; salaGlobalAlvo = "NeonGlb_" + globalRoomIndex;
            let tempConn = peer.connect(salaGlobalAlvo);
            tempConn.on('open', () => {
                connGame = tempConn; const meuNome = document.getElementById('nomeOnlineGeral').value.trim(); connGame.send({t: 'req_global', nome: meuNome});
                connGame.on('data', d => {
                    if (d.t === 'acc_global') {
                        nomeO = meuNome; nomeX = d.nome || "Adversário"; online = true; contraIA = false; meuSimbolo = "O"; minhaVez = false; buscandoGlobal = false;
                        document.getElementById('statusGlobal').innerText = "PARTIDA ENCONTRADA!"; setTimeout(() => { setupConnGame(); iniciarJogo('online'); }, 800);
                    } else if (d.t === 'rej_ocupado') { globalRoomIndex++; if(globalRoomIndex > 20) globalRoomIndex = 1; buscarOponenteGlobal(); }
                });
            });
        }
        function cancelarGlobal() { buscandoGlobal = false; if(peer && peer.id && peer.id.startsWith("NeonGlb_")) { peer.destroy(); setTimeout(() => { iniciarPeer(meuIDOriginal); }, 500); } mostrarSetup('onlineMenu'); }

        function setupConnGame() {
            connGame.on('data', d => {
                if(d.t === 'j') { marcar(d.i, meuSimbolo === 'X' ? 'O' : 'X'); minhaVez = true; atualizarStatus(); }
                if(d.t === 'r') resetLocal(); 
                if(d.t === 'left') lidandoComFuga();
            });
            connGame.on('close', () => { if(ativo && online) lidandoComFuga(); });
        }

        function iniciarJogo(m) {
            if(m === 'local') { nomeX = document.getElementById('nomeLocalX').value.trim(); nomeO = document.getElementById('nomeLocalO').value.trim(); if(!nomeX || !nomeO) return; online = false; contraIA = false; } 
            else if (m === 'ia') { nomeX = document.getElementById('nomeJogadorIA').value.trim(); nomeO = "MÁQUINA"; online = false; contraIA = true; }
            document.getElementById('telaInicial').style.display = 'none'; document.getElementById('telaJogo').style.display = 'flex';
            document.getElementById('txtNomeX').innerText = nomeX.substring(0,8); document.getElementById('txtNomeO').innerText = nomeO.substring(0,8);
            document.getElementById('sX').innerText = pX; document.getElementById('sO').innerText = pO;
            atualizarStatus(); if (contraIA && jAtual === 'O') jogadaIA();
        }

        document.querySelectorAll('.celula').forEach(c => {
            c.addEventListener('click', e => {
                const i = e.target.dataset.index; if(estado[i] !== "" || !ativo || (online && !minhaVez) || (contraIA && jAtual === 'O')) return;
                marcar(i, online ? meuSimbolo : jAtual);
                if(online) { connGame.send({t:'j', i:i}); minhaVez = false; atualizarStatus(); } else { jAtual = jAtual === 'X' ? 'O' : 'X'; atualizarStatus(); if (contraIA && ativo && jAtual === 'O') jogadaIA(); }
            });
        });
        
        function marcar(i, s) { estado[i] = s; const el = document.querySelectorAll('.celula')[i]; el.innerText = s; el.classList.add(s === 'X' ? 'x-player' : 'o-player'); checar(); }
        function atualizarStatus() { if(!ativo) return; const s = document.getElementById('status'); s.style.color = "#fff"; if(online) s.innerText = minhaVez ? "SUA VEZ!" : "AGUARDE..."; else s.innerText = `VEZ DE ${jAtual === 'X' ? nomeX : nomeO}`; }
        
        function checar() {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; let temVenc = false;
            for(let p of w) {
                if(estado[p[0]] !== "" && estado[p[0]] === estado[p[1]] && estado[p[0]] === estado[p[2]]) {
                    temVenc = true; ativo = false; const v = estado[p[0]], n = v === 'X' ? nomeX : nomeO;
                    if (online) updateElo(v === meuSimbolo ? 'vitoria' : 'derrota');
                    const s = document.getElementById('status'); s.innerText = `${n} VENCEU!`; s.style.color = v === 'X' ? 'var(--neon-red)' : 'var(--neon-cyan)';
                    v === 'X' ? pX++ : pO++; document.getElementById('sX').innerText = pX; document.getElementById('sO').innerText = pO;
                    const t = document.getElementById('tabuleiro'); t.classList.add(v === 'X' ? 'board-win-x' : 'board-win-o');
                    document.getElementById('btnNovaPartida').style.display = 'block'; return; 
                }
            }
            if(!temVenc && !estado.includes("")) { ativo = false; if (online) updateElo('empate'); document.getElementById('status').innerText = "DEU VELHA!"; document.getElementById('tabuleiro').classList.add('shake-empate'); document.getElementById('btnNovaPartida').style.display = 'block'; }
        }
        
        function lidandoComFuga() {
            if(!ativo || !online) return; ativo = false; online = false; 
            document.getElementById('tabuleiro').classList.add(meuSimbolo === 'X' ? 'board-win-x' : 'board-win-o');
            meuSimbolo === 'X' ? pX++ : pO++; document.getElementById('sX').innerText = pX; document.getElementById('sO').innerText = pO;
            updateElo('vitoria'); document.getElementById('status').innerText = `FUGIU! VITÓRIA!`;
            setTimeout(()=>sairDaPartida(), 3000);
        }

        function reset() { if(!ativo) { if(online) try { connGame.send({t:'r'}); } catch(e){} resetLocal(); } }
        function resetLocal() {
            estado.fill(""); ativo = true; quemComeca = quemComeca === "X" ? "O" : "X"; jAtual = quemComeca;
            if(online) minhaVez = (meuSimbolo === quemComeca);
            document.querySelectorAll('.celula').forEach(c => { c.innerText = ""; c.className = "celula"; c.classList.remove('x-player','o-player'); });
            const t = document.getElementById('tabuleiro'); t.className = "tabuleiro"; document.body.className="";
            document.getElementById('btnNovaPartida').style.display = 'none'; atualizarStatus(); if (contraIA && jAtual === 'O') jogadaIA();
        }

        function sairDaPartida() {
            if (online && connGame && connGame.open) try { connGame.send({t: 'left'}); } catch(e) {}
            document.getElementById('telaJogo').style.display = 'none'; document.getElementById('telaInicial').style.display = 'flex';
            mostrarSetup('menuPrincipal');
            if(connGame) connGame.close(); online = false; ativo = false;
            resetLocal(); pX = 0; pO = 0; document.getElementById('sX').innerText = pX; document.getElementById('sO').innerText = pO;
        }

        // IA MINIMAX Simplificada no modo minificado
        function achaMovimentoCritico(j) { for(let i=0; i<9; i++) { if(estado[i]==="") { estado[i]=j; let v=checarVitoriaSimples(estado)===j; estado[i]=""; if(v) return i; } } return -1; }
        function jogadaIA() {
            if (!ativo || !contraIA) return; document.getElementById('status').innerText = "PENSANDO...";
            setTimeout(() => {
                let index, v=estado.filter(x=>x==="").length, disp=estado.map((v,i)=>v===""?i:null).filter(x=>x!==null);
                if (dificuldadeIA === 'noob') index = disp[Math.floor(Math.random() * disp.length)];
                else if (dificuldadeIA === 'mestre') { let win = achaMovimentoCritico('O'), block = achaMovimentoCritico('X'); if (win !== -1) index = win; else if (block !== -1) index = block; else { if (Math.random() > 0.75) index = disp[Math.floor(Math.random() * disp.length)]; else index = v === 9 ? [0, 2, 4, 6, 8][Math.floor(Math.random() * 5)] : minimax(estado, 'O').index; } } 
                else { if (v === 9) index = [0, 2, 4, 6, 8][Math.floor(Math.random() * 5)]; else if (v === 8 && estado[4] === "") index = 4; else index = minimax(estado, 'O').index; }
                marcar(index, 'O'); if (ativo) { jAtual = 'X'; atualizarStatus(); }
            }, 600);
        }
        function checarVitoriaSimples(b) { const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; for(let p of w) if(b[p[0]] !== "" && b[p[0]] === b[p[1]] && b[p[0]] === b[p[2]]) return b[p[0]]; return null; }
        function minimax(nE, jAI) {
            let v = checarVitoriaSimples(nE); if (v === 'X') return { score: -10 }; if (v === 'O') return { score: 10 }; if (!nE.includes("")) return { score: 0 }; 
            let movs = []; for (let i = 0; i < 9; i++) { if (nE[i] === "") { let mov = { index: i }; nE[i] = jAI; mov.score = minimax(nE, jAI === 'O' ? 'X' : 'O').score; nE[i] = ""; movs.push(mov); } }
            let bestMov; if (jAI === 'O') { let bS = -Infinity; for (let i = 0; i < movs.length; i++) { if (movs[i].score > bS) { bS = movs[i].score; bestMov = i; } } } else { let bS = Infinity; for (let i = 0; i < movs.length; i++) { if (movs[i].score < bS) { bS = movs[i].score; bestMov = i; } } } return movs[bestMov];
        }

        // LINK DE CONVITE
        function gerarLinkConvite() { let link = window.location.href.split('?')[0] + "?roomId=" + meuIDOriginal; navigator.clipboard.writeText(link).catch(e=>{}); mostrarAviso("Link Copiado! Pode mandar no WhatsApp."); }
    </script>
