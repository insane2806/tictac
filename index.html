<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #6200ee; --secondary: #10b981; --danger: #f43f5e; --bg: #050505; }
        
        body {
            background: radial-gradient(circle at top, #1e2030 0%, var(--bg) 100%);
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }

        #telaInicial, #telaJogo { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #telaJogo { display: none; }

        .logo { font-size: 3rem; font-weight: 900; margin-bottom: 5px; letter-spacing: -2px; }
        .sub { color: #666; font-size: 0.8rem; margin-bottom: 30px; letter-spacing: 2px; }
        
        .input-nome { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px; border-radius: 12px; width: 260px; 
            text-align: center; font-size: 1rem; outline: none; box-sizing: border-box;
            margin-bottom: 12px;
        }
        .input-nome:focus { border-color: var(--primary); }

        .btn-menu {
            width: 280px; padding: 16px; margin: 8px; border-radius: 12px;
            border: none; font-weight: bold; cursor: pointer; font-size: 1rem;
            transition: 0.2s;
        }
        .btn-local { background: #fff; color: #000; }
        .btn-online { background: var(--primary); color: white; }
        
        /* GAVETAS DE SETUP CENTRALIZADAS */
        #setupOnline, #setupLocal { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            width: 100%; 
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .credito-footer { margin-top: 40px; font-size: 0.7rem; color: #333; letter-spacing: 1px; }

        /* JOGO */
        .placar { display: flex; gap: 20px; margin: 20px 0; background: rgba(255,255,255,0.02); padding: 12px 20px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .tabuleiro { display: grid; grid-template-columns: repeat(3, 90px); gap: 10px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .celula { width: 90px; height: 90px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; cursor: pointer; }
        .x-player { color: var(--danger); text-shadow: 0 0 15px var(--danger); }
        .o-player { color: var(--secondary); text-shadow: 0 0 15px var(--secondary); }

        #status { margin-top: 25px; font-weight: bold; font-size: 1rem; color: #888; text-transform: uppercase; }
        .assinatura-jogo { position: absolute; bottom: 10px; right: 15px; font-size: 0.65rem; color: #222; }
    </style>
</head>
<body>

    <div id="telaInicial">
        <div class="logo">Jogo da Velha</div>
        <div class="sub">MULTIPLAYER</div>

        <div id="botoesMenu" style="display: flex; flex-direction: column; align-items: center;">
            <button class="btn-menu btn-local" onclick="mostrarSetup('local')">Duelo Local</button>
            <button class="btn-menu btn-online" onclick="mostrarSetup('online')">Jogar Online</button>
        </div>

        <div id="setupLocal">
            <input type="text" id="nomeLocalX" class="input-nome" placeholder="Nome do Jogador X" maxlength="12">
            <input type="text" id="nomeLocalO" class="input-nome" placeholder="Nome do Jogador O" maxlength="12">
            <button class="btn-menu btn-local" onclick="iniciarJogo('local')">Começar Partida</button>
            <button style="background:none; border:none; color:#555; cursor:pointer; margin-top: 5px;" onclick="voltarMenu()">Voltar</button>
        </div>
        
        <div id="setupOnline">
            <input type="text" id="nomeOnlineEu" class="input-nome" placeholder="Seu apelido..." maxlength="12" oninput="atualizarPeerNome()">
            <p style="font-size: 0.7rem; color: #444; margin-bottom: 10px;">SEU CÓDIGO: <b id="meuId" style="color:var(--secondary)">...</b></p>
            
            <input type="text" id="idAmigo" class="input-nome" placeholder="Código do Amigo" style="width: 210px; border-color: rgba(98, 0, 238, 0.3);">
            <button class="btn-menu btn-online" style="background:var(--secondary); width: 210px; padding: 12px;" onclick="conectar()">Convidar</button>
            <button style="background:none; border:none; color:#555; cursor:pointer; margin-top: 15px;" onclick="voltarMenu()">Voltar</button>
        </div>

        <div class="credito-footer">DESENVOLVIDO POR THALISONDEV</div>
    </div>

    <div id="painelPedido" style="position: fixed; top: 20px; background: #1a1c2c; border: 1px solid var(--primary); padding: 20px; border-radius: 15px; text-align: center; z-index: 200; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.8);">
        <p id="msgPedido" style="margin-bottom: 15px; font-weight: bold;"></p>
        <button style="background:var(--secondary); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;" onclick="repostaPedido(true)">ACEITAR</button>
        <button style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-left: 10px;" onclick="repostaPedido(false)">RECUSAR</button>
    </div>

    <div id="telaJogo">
        <div class="placar">
            <div class="x-player"><span id="txtNomeX">X</span>: <span id="sX">0</span></div>
            <div class="o-player"><span id="txtNomeO">O</span>: <span id="sO">0</span></div>
        </div>

        <div class="tabuleiro" id="tabuleiro">
            <div class="celula" data-index="0"></div><div class="celula" data-index="1"></div><div class="celula" data-index="2"></div>
            <div class="celula" data-index="3"></div><div class="celula" data-index="4"></div><div class="celula" data-index="5"></div>
            <div class="celula" data-index="6"></div><div class="celula" data-index="7"></div><div class="celula" data-index="8"></div>
        </div>

        <div id="status">Vez de X</div>
        
        <button id="btnNovaPartida" class="btn-menu btn-online" style="width:180px; margin-top:30px; font-size: 0.9rem;" onclick="reset()">Nova Partida</button>
        <button style="background:none; border:none; color:#333; cursor:pointer; margin-top:10px; font-size: 0.7rem;" onclick="location.reload()">Sair</button>

        <div class="assinatura-jogo">ThalisonDev</div>
    </div>

    <script>
        const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
        function tocarSom(f, t, d, v=0.1) {
            try { if (ctxAudio.state === 'suspended') ctxAudio.resume(); const o = ctxAudio.createOscillator(); const g = ctxAudio.createGain(); o.type = t; o.frequency.value = f; g.gain.setValueAtTime(v, ctxAudio.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, ctxAudio.currentTime + d); o.connect(g); g.connect(ctxAudio.destination); o.start(); o.stop(ctxAudio.currentTime + d); } catch(e) {}
        }

        let nomeX = "X", nomeO = "O", meuNome = "";
        let jAtual = "X", ativo = true, estado = ["","","","","","","","",""];
        let pX = 0, pO = 0, online = false, minhaVez = true, meuSimbolo = "X", conn, tempConn;
        let quemComecaAProxima = "X"; 

        const peer = new Peer(Math.floor(10000 + Math.random() * 90000).toString());
        peer.on('open', id => document.getElementById('meuId').innerText = id);

        peer.on('connection', c => {
            tempConn = c;
            const nomeInvasor = c.metadata ? c.metadata.nome : "Alguém";
            document.getElementById('msgPedido').innerText = `${nomeInvasor} quer jogar!`;
            document.getElementById('painelPedido').style.display = 'block';
            nomeO = nomeInvasor;
        });

        function mostrarSetup(modo) {
            document.getElementById('botoesMenu').style.display = 'none';
            if(modo === 'local') {
                document.getElementById('setupLocal').style.display = 'flex';
            } else {
                document.getElementById('setupOnline').style.display = 'flex';
            }
        }

        function voltarMenu() {
            document.getElementById('botoesMenu').style.display = 'flex';
            document.getElementById('setupLocal').style.display = 'none';
            document.getElementById('setupOnline').style.display = 'none';
        }

        function iniciarJogo(modo) {
            if(modo === 'local') {
                nomeX = document.getElementById('nomeLocalX').value || "Jogador X";
                nomeO = document.getElementById('nomeLocalO').value || "Jogador O";
                document.getElementById('btnNovaPartida').style.display = 'block';
            }
            document.getElementById('telaInicial').style.display = 'none';
            document.getElementById('telaJogo').style.display = 'flex';
            document.getElementById('txtNomeX').innerText = nomeX;
            document.getElementById('txtNomeO').innerText = nomeO;
            atualizarStatus();
        }

        function repostaPedido(aceitou) {
            document.getElementById('painelPedido').style.display = 'none';
            if(aceitou) {
                meuNome = document.getElementById('nomeOnlineEu').value || "Player";
                nomeX = meuNome; 
                conn = tempConn; online = true; meuSimbolo = "X"; minhaVez = true;
                setupConn();
                iniciarJogo('online');
                conn.send({t: 'aceito', nome: meuNome});
            } else {
                tempConn.send({t: 'recusado'});
            }
        }

        function conectar() {
            const id = document.getElementById('idAmigo').value;
            if(!id) return;
            meuNome = document.getElementById('nomeOnlineEu').value || "Player";
            nomeO = meuNome; 
            conn = peer.connect(id, { metadata: { nome: meuNome } }); 
            setupConn();
            document.getElementById('status').innerText = "Conectando...";
        }

        function setupConn() {
            conn.on('data', d => { 
                if(d.t==='aceito') { 
                    online = true; meuSimbolo = "O"; minhaVez = false; 
                    nomeX = d.nome; 
                    iniciarJogo('online');
                }
                if(d.t==='j'){ marcar(d.i, meuSimbolo==='X'?'O':'X'); minhaVez=true; atualizarStatus(); }
                if(d.t==='r') resetLocal();
            });
        }

        document.querySelectorAll('.celula').forEach(c => c.addEventListener('click', e => {
            const i = e.target.dataset.index;
            if(estado[i] !== "" || !ativo || (online && !minhaVez)) return;
            marcar(i, online ? meuSimbolo : jAtual);
            if(online) { conn.send({t:'j', i:i}); minhaVez = false; atualizarStatus(); }
            else { jAtual = jAtual === "X" ? "O" : "X"; atualizarStatus(); }
        }));

        function marcar(i, s) {
            tocarSom(800, 'sine', 0.1);
            estado[i] = s;
            const c = document.querySelectorAll('.celula')[i];
            c.innerText = s; c.classList.add(s === "X" ? "x-player" : "o-player");
            checar();
        }

        function atualizarStatus() {
            if(!ativo) return;
            const vezDe = (online) ? (minhaVez ? nomeX : nomeO) : (jAtual === "X" ? nomeX : nomeO);
            document.getElementById('status').innerText = (online && minhaVez) ? "Sua Vez!" : `Vez de ${vezDe}`;
        }

        function checar() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let p of wins) {
                if(estado[p[0]] && estado[p[0]] === estado[p[1]] && estado[p[0]] === estado[p[2]]) {
                    const vencedor = estado[p[0]] === 'X' ? nomeX : nomeO;
                    document.getElementById('status').innerText = `${vencedor} VENCEU!`;
                    confetti(); ativo = false;
                    estado[p[0]] === 'X' ? pX++ : pO++;
                    document.getElementById('sX').innerText = pX; document.getElementById('sO').innerText = pO;
                    document.getElementById('btnNovaPartida').style.display = 'block'; 
                    return;
                }
            }
            if(!estado.includes("")) { document.getElementById('status').innerText = "EMPATE!"; ativo = false; document.getElementById('btnNovaPartida').style.display = 'block'; }
        }

        function reset() { 
            quemComecaAProxima = (quemComecaAProxima === "X") ? "O" : "X";
            if(online && conn) conn.send({t:'r'}); 
            resetLocal(); 
        }
        
        function resetLocal() {
            estado.fill(""); ativo = true;
            jAtual = quemComecaAProxima;
            if(online) minhaVez = (meuSimbolo === quemComecaAProxima);
            document.querySelectorAll('.celula').forEach(c => { c.innerText = ""; c.className = "celula"; });
            atualizarStatus();
            if(online) document.getElementById('btnNovaPartida').style.display = 'none'; 
        }
    </script>
</body>
</html>
