<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevThalison Pro Online</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            background: radial-gradient(circle at top, #1e2030 0%, #050505 100%);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }

        .header-container {
            position: absolute; top: 15px; width: 90%;
            display: flex; justify-content: center; align-items: center;
        }

        .creditos { font-size: 0.8rem; color: #94a3b8; letter-spacing: 1px; }

        .btn-online-toggle {
            position: absolute; right: 0;
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            color: white; padding: 6px; border-radius: 50%; cursor: pointer; font-size: 0.9rem;
        }

        .menu-online {
            position: absolute; top: 60px; background: rgba(10, 10, 20, 0.98);
            padding: 15px; border-radius: 15px; border: 1px solid #6200ee;
            width: 260px; text-align: center; display: none; z-index: 101;
        }

        #idDisplay { color: #10b981; font-family: monospace; font-size: 1.3rem; font-weight: bold; background: #000; padding: 5px; border-radius: 8px; margin: 10px 0; display: block; }

        .setup-nomes { margin-top: 40px; margin-bottom: 15px; display: flex; gap: 10px; }
        input {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 10px; border-radius: 12px; width: 100px; text-align: center;
        }

        .placar {
            display: flex; gap: 20px; margin-bottom: 20px; font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.03); padding: 10px 20px; border-radius: 50px;
        }

        .tabuleiro {
            display: grid; grid-template-columns: repeat(3, 90px); gap: 12px;
            background: rgba(255, 255, 255, 0.02); padding: 15px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: background 0.5s ease;
        }

        /* ANIMAÇÃO DE IMPACTO SECO E COR DE PERDIÇÃO */
        .impacto-velha { 
            animation: impactQuick 0.4s ease-out forwards; 
            background: rgba(80, 0, 0, 0.9) !important;
            border-color: #550000 !important;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        @keyframes impactQuick {
            0% { transform: scale(1); }
            15% { transform: scale(1.08) translate(8px, -8px); }
            30% { transform: translate(-8px, 8px); }
            45% { transform: translate(8px, 8px); }
            60% { transform: translate(-8px, -8px); }
            75% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1); }
        }

        .celula {
            width: 90px; height: 90px; background: rgba(255, 255, 255, 0.04);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-size: 2.8rem; font-weight: 900; cursor: pointer;
        }

        .x-player { color: #f43f5e; text-shadow: 0 0 15px #f43f5e; }
        .o-player { color: #10b981; text-shadow: 0 0 15px #10b981; }

        .status { margin-top: 20px; font-weight: bold; font-size: 1.2rem; height: 30px; text-align: center; }

        button.principal {
            margin-top: 20px; background: #6200ee; color: white; border: none;
            padding: 14px 35px; border-radius: 50px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="creditos">Desenvolvido por DevThalison</div>
        <button class="btn-online-toggle" onclick="toggleOnlineMenu()">🌐</button>
    </div>

    <div class="menu-online" id="menuOnline">
        <small>Seu Código Multiplayer:</small>
        <span id="idDisplay">...</span>
        <input type="text" id="idAmigo" style="width:85%; background:#000; color:white; border:1px solid #333; padding:8px; border-radius:8px; margin-bottom:10px" placeholder="Código do amigo" maxlength="5">
        <button style="background:#10b981; border:none; color:white; padding:10px; border-radius:8px; width:100%; font-weight:bold; cursor:pointer;" onclick="conectar()">Conectar Agora</button>
    </div>

    <div class="setup-nomes">
        <input type="text" id="nomeX" placeholder="Jogador X" oninput="atualizarNomes()">
        <input type="text" id="nomeO" placeholder="Jogador O" oninput="atualizarNomes()">
    </div>

    <div class="placar">
        <div class="x-player"><span id="lX">X</span>: <span id="sX">0</span></div>
        <div class="o-player"><span id="lO">O</span>: <span id="sO">0</span></div>
    </div>

    <div class="tabuleiro" id="tabuleiro">
        <div class="celula" data-index="0"></div><div class="celula" data-index="1"></div><div class="celula" data-index="2"></div>
        <div class="celula" data-index="3"></div><div class="celula" data-index="4"></div><div class="celula" data-index="5"></div>
        <div class="celula" data-index="6"></div><div class="celula" data-index="7"></div><div class="celula" data-index="8"></div>
    </div>

    <div class="status" id="status">Vez do X</div>
    <button class="principal" onclick="reset()">Nova Partida</button>

    <script>
        const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
        function tocarSom(f, t, d, v=0.1) {
            try {
                if (ctxAudio.state === 'suspended') ctxAudio.resume();
                const o = ctxAudio.createOscillator(); const g = ctxAudio.createGain();
                o.type = t; o.frequency.value = f;
                g.gain.setValueAtTime(v, ctxAudio.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, ctxAudio.currentTime + d);
                o.connect(g); g.connect(ctxAudio.destination);
                o.start(); o.stop(ctxAudio.currentTime + d);
            } catch(e) {}
        }

        const celulas = document.querySelectorAll('.celula');
        const statusTxt = document.getElementById('status');
        const tab = document.getElementById('tabuleiro');
        let jAtual = "X", ativo = true, estado = ["","","","","","","","",""];
        let pX = 0, pO = 0, nX = "X", nO = "O", online = false, minhaVez = true, meuSimbolo = "X", conn;

        const cod = Math.floor(10000 + Math.random() * 90000).toString();
        const peer = new Peer(cod);
        peer.on('open', id => document.getElementById('idDisplay').innerText = id);
        peer.on('connection', c => { 
            conn = c; online = true; meuSimbolo = "X"; minhaVez = true; 
            setupConn(); statusTxt.innerText = "Sua Vez!"; 
            document.getElementById('menuOnline').style.display="none"; 
        });

        function conectar() {
            const id = document.getElementById('idAmigo').value;
            conn = peer.connect(id); online = true; meuSimbolo = "O"; minhaVez = false; 
            setupConn(); statusTxt.innerText = "Aguardando X..."; 
            document.getElementById('menuOnline').style.display="none";
        }

        function setupConn() {
            conn.on('data', d => { 
                if(d.t==='j'){ marcar(d.i, meuSimbolo==='X'?'O':'X'); minhaVez=true; statusTxt.innerText="Sua Vez!"; }
                if(d.t==='r') resetLocal();
            });
        }

        function toggleOnlineMenu() { 
            const m = document.getElementById('menuOnline'); 
            m.style.display = m.style.display === 'none' ? 'block' : 'none'; 
        }

        function atualizarNomes() {
            nX = document.getElementById('nomeX').value || "X";
            nO = document.getElementById('nomeO').value || "O";
            document.getElementById('lX').innerText = nX;
            document.getElementById('lO').innerText = nO;
        }

        celulas.forEach(c => c.addEventListener('click', e => {
            const i = e.target.dataset.index;
            if(estado[i] !== "" || !ativo || (online && !minhaVez)) return;
            marcar(i, online ? meuSimbolo : jAtual);
            if(online) { conn.send({t:'j', i:i}); minhaVez = false; statusTxt.innerText = "Aguardando..."; }
            else { jAtual = jAtual === "X" ? "O" : "X"; statusTxt.innerText = `Vez de ${jAtual==='X'?nX:nO}`; }
        }));

        function marcar(i, s) {
            tocarSom(800, 'sine', 0.1);
            estado[i] = s;
            celulas[i].innerText = s;
            celulas[i].classList.add(s === "X" ? "x-player" : "o-player");
            checar();
        }

        function checar() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let p of wins) {
                if(estado[p[0]] && estado[p[0]] === estado[p[1]] && estado[p[0]] === estado[p[2]]) {
                    statusTxt.innerText = `${estado[p[0]] === 'X' ? nX : nO} VENCEU!`;
                    tocarSom(500, 'sine', 0.2); setTimeout(() => tocarSom(800, 'sine', 0.4), 150);
                    confetti(); ativo = false;
                    estado[p[0]] === 'X' ? pX++ : pO++;
                    document.getElementById('sX').innerText = pX;
                    document.getElementById('sO').innerText = pO;
                    return;
                }
            }
            if(!estado.includes("")) { 
                statusTxt.innerText = "EMPATE!"; 
                tocarSom(100, 'sawtooth', 0.6, 0.25); // Som Grave
                tab.classList.add('impacto-velha'); // O "Tranco" imersivo
                ativo = false; 
            }
        }

        function reset() { 
            tocarSom(600, 'sine', 0.1);
            if(online && conn) conn.send({t:'r'}); 
            resetLocal(); 
        }
        function resetLocal() {
            estado.fill(""); ativo = true; jAtual = "X"; minhaVez = (meuSimbolo === "X");
            tab.classList.remove('impacto-velha');
            celulas.forEach(c => { c.innerText = ""; c.className = "celula"; });
            statusTxt.innerText = online ? (minhaVez ? "Sua vez!" : "Aguardando...") : `Vez de ${nX}`;
        }
    </script>
</body>
</html>
