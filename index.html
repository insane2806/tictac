<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo da Velha - Neon Galaxy Dinâmico</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-red: #ff2a6d;
            --neon-cyan: #05d9e8;
            --neon-purple: #9d4edd;
            --neon-green: #00ff7f;
            --neon-yellow: #f1c40f;
            --bg-dark: #020205; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            color: white; font-family: 'Montserrat', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; height: 100svh; overflow: hidden;
            position: relative; background-color: var(--bg-dark);
            transition: background-color 0.1s; 
        }

        /* Efeitos Flash */
        .flash-red { animation: flashShock 0.4s ease-in-out; }
        @keyframes flashShock { 0%, 100% { background-color: transparent; } 20% { background-color: rgba(255, 42, 109, 0.3); } 40% { background-color: transparent; } 60% { background-color: rgba(255, 42, 109, 0.4); } 80% { background-color: transparent; } }
        .flash-win-x { animation: flashWinX 0.6s ease-out; }
        @keyframes flashWinX { 0%, 100% { background-color: transparent; } 20% { background-color: rgba(255, 42, 109, 0.4); } 80% { background-color: transparent; } }
        .flash-win-o { animation: flashWinO 0.6s ease-out; }
        @keyframes flashWinO { 0%, 100% { background-color: transparent; } 20% { background-color: rgba(5, 217, 232, 0.4); } 80% { background-color: transparent; } }

        /* Fundo Animado */
        .background-animated {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
            background: radial-gradient(circle at 15% 20%, rgba(15, 6, 35, 0.8) 0%, transparent 40%),
                        radial-gradient(circle at 85% 80%, rgba(6, 19, 35, 0.8) 0%, transparent 40%), #020205;
        }
        .background-animated::before {
            content: ''; position: absolute; top: -100%; left: -100%; right: -100%; bottom: -100%;
            background-image: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.3) 2px, transparent 4px),
                              radial-gradient(circle, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.2) 1.5px, transparent 3px);
            background-size: 300px 300px, 200px 200px; opacity: 0.6; animation: moveStars 40s linear infinite; 
        }
        @keyframes moveStars { from { transform: translateY(0) translateX(0); } to { transform: translateY(300px) translateX(150px); } }

        /* Botões Topo */
        .btn-top-corner, .btn-top-corner-2 {
            position: absolute; top: 12px; background: rgba(5, 5, 10, 0.6);
            border: 1px solid var(--neon-cyan); border-radius: 50%; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 0 10px rgba(5, 217, 232, 0.3); z-index: 100;
        }
        .btn-top-corner { right: 15px; }
        .btn-top-corner-2 { right: 60px; }
        .icone-som { width: 18px; height: 18px; fill: var(--neon-cyan); }

        /* Menus */
        .logo-container { margin-bottom: 40px; text-align: center; }
        .logo { font-size: 4.5rem; font-weight: 900; font-style: italic; color: white; text-shadow: 0 0 15px white, 0 0 25px var(--neon-cyan); }
        .logo span { color: white; }
        .sub { color: var(--neon-cyan); font-size: 0.8rem; letter-spacing: 5px; text-transform: uppercase; border: 1.5px solid var(--neon-cyan); border-radius: 20px; padding: 6px 18px; display: inline-block; background: rgba(0, 0, 0, 0.6); }

        .btn-menu, .btn-acao { width: 300px; padding: 18px; border-radius: 40px; border: none; font-weight: 700; cursor: pointer; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; color: white; transition: 0.3s; margin-bottom: 15px; }
        .btn-menu:hover { transform: scale(1.05); }
        .btn-local { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.25); }
        .btn-online { background: linear-gradient(90deg, #3d0a6b, #8a2be2, #3d0a6b); border: 2px solid var(--neon-purple); box-shadow: 0 0 20px var(--neon-purple); }
        .btn-ia { background: linear-gradient(90deg, #002244, #05d9e8, #002244); border: 2px solid var(--neon-cyan); box-shadow: 0 0 20px var(--neon-cyan); }
        
        .input-nome { background: rgba(0,0,0,0.7); border: 1.5px solid rgba(255,255,255,0.15); color: white; padding: 18px; border-radius: 40px; width: 300px; text-align: center; outline: none; margin-bottom: 15px; }
        .erro-input { color: var(--neon-red); font-size: 0.8rem; margin-bottom: 15px; font-weight: bold; display: none; text-shadow: 0 0 10px var(--neon-red); }

        /* Jogo */
        .placar { display: flex; gap: 35px; margin-bottom: 45px; background: rgba(5, 5, 10, 0.9); padding: 12px 35px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); }
        .x-player, .o-player { position: relative; }
        .tabuleiro { display: grid; grid-template-columns: repeat(3, 95px); gap: 5px; background: rgba(5, 217, 232, 0.5); padding: 5px; border-radius: 22px; border: 2.5px solid var(--neon-cyan); box-shadow: 0 0 30px var(--neon-cyan); }
        .celula { width: 95px; height: 95px; background: #05060a; display: flex; align-items: center; justify-content: center; font-size: 3.8rem; font-weight: 900; cursor: pointer; }
        
        .reacao-flutuante {
            position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
            font-size: 2.2rem !important; pointer-events: none; animation: floatUp 2s ease-out forwards; z-index: 9999;
        }
        @keyframes floatUp { 0% { opacity: 0; transform: translate(-50%, 10px) scale(0.5); } 15% { opacity: 1; transform: translate(-50%, -10px) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -60px) scale(1); } }

        #barraReacoes { display: none; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn-reacao { background: rgba(255,255,255,0.1); border: 1px solid var(--neon-cyan); border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 1.5rem; }

        .credito-footer { position: absolute; bottom: 25px; text-align: center; font-size: 0.75rem; color: #ccc; }
        .loader-global { margin: 20px 0; width: 40px; height: 40px; border: 4px solid rgba(5, 217, 232, 0.2); border-left-color: var(--neon-cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="background-animated"></div> 
    <audio id="musicaFundo" loop><source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3?filename=cyberpunk-2099-10701.mp3" type="audio/mpeg"></audio>
    <audio id="vozAmigo" autoplay></audio>

    <button id="btnAudio" class="btn-top-corner" onclick="toggleAudio()"><svg id="iconeSomOff" viewBox="0 0 24 24" class="icone-som"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg></button>
    <button id="btnMic" class="btn-top-corner" onclick="toggleMic()" style="display:none;"><svg id="iconeMicOff" viewBox="0 0 24 24" class="icone-som" style="fill:var(--neon-red)"><path d="M19 11h-2c0 .91-.26 1.75-.69 2.48l1.46 1.46C18.54 13.82 19 12.46 19 11zM14.98 11.17c.02-.11.02-.23.02-.34V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.18l5.98 5.99zM4.27 3L3 4.27l6 6V11c0 1.66 1.34 3 3 3 .23 0 .44-.02.65-.08l1.87 1.87c-.73.43-1.57.69-2.48.69-2.76 0-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c.57-.08 1.12-.24 1.64-.46l5.09 5.09 1.27-1.27L4.27 3z"/></svg></button>
    <button id="btnMutarAmigo" class="btn-top-corner-2" onclick="toggleMuteAmigo()" style="display:none;"><svg id="iconeSpkOn" viewBox="0 0 24 24" class="icone-som"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>

    <div id="modalConvite">
        <div class="modal-content">
            <h3 style="color:var(--neon-cyan);margin-bottom:10px">Novo Desafio!</h3>
            <p id="textoConvite" style="margin-bottom:15px">Alguém quer jogar com você.</p>
            <input type="text" id="nomeConvite" class="input-nome" placeholder="Seu Apelido">
            <p id="erroConvite" class="erro-input">Digite seu apelido!</p>
            <button class="btn-menu btn-online" style="background:var(--neon-green);color:black" onclick="aceitarConvite()">ACEITAR</button>
            <button class="btn-menu btn-local" onclick="recusarConvite()">RECUSAR</button>
        </div>
    </div>

    <div id="telaInicial">
        <div class="logo-container"><div class="logo">Tic<span>Tac</span></div><div class="sub">Jogo da Velha</div></div>
        <div id="botoesMenu">
            <button class="btn-menu btn-local" onclick="mostrarSetup('local')">Duelo Local</button>
            <button class="btn-menu btn-online" onclick="mostrarSetup('onlineMenu')">Jogar Online</button>
            <button class="btn-menu btn-ia" onclick="mostrarSetup('ia')">Jogador vs Máquina</button>
        </div>

        <div id="setupOnlineMenu">
            <input type="text" id="nOG" class="input-nome" placeholder="Seu Apelido" maxlength="10">
            <p id="errOG" class="erro-input">Preencha seu apelido!</p>
            <button class="btn-menu btn-ia" onclick="abrirGlobal()">🌍 Partida Global</button>
            <button class="btn-menu btn-online" onclick="abrirAmigo()">🤝 Com Amigo</button>
            <button class="btn-texto" onclick="voltarMenu()">Voltar</button>
        </div>

        <div id="setupOnlineAmigo">
            <p style="font-size:0.8rem;margin-bottom:15px">SEU ID: <span id="meuId" style="color:var(--neon-cyan)">...</span></p>
            <input type="number" id="idAmigo" class="input-nome" placeholder="ID do Amigo" inputmode="numeric">
            <button id="btnConn" class="btn-menu btn-online" onclick="conectarAmigo()">Conectar</button>
            <p id="errAmigo" class="erro-input">ID não encontrado!</p>
            <button class="btn-texto" onclick="mostrarSetup('onlineMenu')">Voltar</button>
        </div>

        <div id="setupGlobal">
            <h3 id="statusGlobal">Procurando Partida...</h3>
            <div class="loader-global"></div>
            <button class="btn-menu btn-local" onclick="cancelarGlobal()">Cancelar</button>
        </div>

        <div id="setupIA">
            <input type="text" id="nameIA" class="input-nome" placeholder="Seu Apelido" maxlength="10">
            <p id="errIA" class="erro-input">Preencha seu apelido!</p>
            <button class="btn-menu" onclick="startIA('noob')" style="border:2px solid var(--neon-green)">NOOB</button>
            <button class="btn-menu" onclick="startIA('mestre')" style="border:2px solid var(--neon-yellow)">MESTRE</button>
            <button class="btn-menu" onclick="startIA('ultra')" style="border:2px solid var(--neon-red)">ULTRA INSTINTO</button>
            <button class="btn-texto" onclick="voltarMenu()">Voltar</button>
        </div>

        <div id="setupLocal">
            <input type="text" id="nLX" class="input-nome" placeholder="Jogador X">
            <input type="text" id="nLO" class="input-nome" placeholder="Jogador O">
            <p id="errL" class="erro-input">Preencha os dois nomes!</p>
            <button class="btn-menu btn-online" onclick="startLocal()">Começar</button>
            <button class="btn-texto" onclick="voltarMenu()">Voltar</button>
        </div>
        
        <div class="credito-footer">Developer DevThalison<br>Axion Instagram</div>
    </div>

    <div id="telaJogo">
        <div id="alertaWifi" style="display:none">⚠️ Conexão Fraca...</div>
        <div class="placar">
            <div class="x-player"><span id="txX">X</span> <span id="sX">0</span></div>
            <div style="color:#333">|</div>
            <div class="o-player"><span id="txO">O</span> <span id="sO">0</span></div>
        </div>
        <div class="tabuleiro" id="board">
            <div class="celula" data-index="0"></div><div class="celula" data-index="1"></div><div class="celula" data-index="2"></div>
            <div class="celula" data-index="3"></div><div class="celula" data-index="4"></div><div class="celula" data-index="5"></div>
            <div class="celula" data-index="6"></div><div class="celula" data-index="7"></div><div class="celula" data-index="8"></div>
        </div>
        <div id="status">Sua Vez</div>
        <div id="barraReacoes">
            <button class="btn-reacao" onclick="sendEmoji('🤣')">🤣</button>
            <button class="btn-reacao" onclick="sendEmoji('🤬')">🤬</button>
            <button class="btn-reacao" onclick="sendEmoji('😭')">😭</button>
            <button class="btn-reacao" onclick="sendEmoji('💀')">💀</button>
        </div>
        <button id="btnNew" class="btn-acao" style="display:none" onclick="reset()">Nova Partida</button>
        <button class="btn-texto" style="margin-top:25px" onclick="sairPartida()">Sair</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const bgMusic = document.getElementById('musicaFundo');
        let musicOn = false, peer, conn, myStream, micOn = false, friendMuted = false;
        let nX="X", nO="O", cur="X", startP="X", active=true, state=["","","","","","","","",""];
        let pX=0, pO=0, isOnline=false, mySym="X", isIA=false, diffIA="ultra", isGlb=false;
        let lastPong = Date.now(), heartbeat;

        // Recupera Nick Salvo
        window.onload = () => {
            let saved = localStorage.getItem('nickTicTac');
            if(saved) {
                document.getElementById('nOG').value = saved;
                document.getElementById('nameIA').value = saved;
            }
        };

        function toggleAudio() { 
            if(musicOn){ bgMusic.pause(); } else { bgMusic.volume=0.3; bgMusic.play().catch(()=>{}); }
            musicOn=!musicOn;
        }

        function som(f, d) { try { let o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.frequency.value=f; g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); } catch(e){} }
        function somVitoria() { som(800,0.4); som(1200,0.4); }

        async function toggleMic() {
            if(!myStream) {
                try { myStream = await navigator.mediaDevices.getUserMedia({audio:true}); micOn = true;
                if(isOnline && conn) peer.call(conn.peer, myStream);
                } catch(e){ alert("Permita o microfone!"); return; }
            } else { micOn=!micOn; myStream.getAudioTracks()[0].enabled=micOn; }
            document.getElementById('iconeMicOff').style.fill = micOn ? 'var(--neon-cyan)' : 'var(--neon-red)';
        }

        function toggleMuteAmigo() { friendMuted=!friendMuted; document.getElementById('vozAmigo').muted=friendMuted; }

        function initPeer(id) {
            peer = new Peer(id);
            peer.on('open', i => { 
                document.getElementById('meuId').innerText=i; 
                if(isGlb && i.startsWith("NeonGlb")) document.getElementById('statusGlobal').innerText="AGUARDANDO JOGADOR...";
            });
            peer.on('connection', c => {
                if(active && (isIA || (isOnline && cur!=='X'))) { c.on('open', ()=> { c.send({t:'busy'}); setTimeout(()=>c.close(),500); }); return; }
                conn=c; setupConn();
            });
            peer.on('call', call => { call.answer(myStream); call.on('stream', s => document.getElementById('vozAmigo').srcObject=s); });
            peer.on('error', e => {
                if(e.type==='peer-unavailable' && isGlb) { peer.destroy(); setTimeout(()=>initPeer("NeonGlb_1"),500); }
            });
        }
        initPeer(Math.floor(10000+Math.random()*89999).toString());

        function setupConn() {
            conn.on('data', d => {
                if(d.t==='req') { nX=d.n; document.getElementById('modalConvite').style.display='flex'; }
                if(d.t==='acc') { nO=d.n; isOnline=true; mySym="X"; iniciarJogo('online'); }
                if(d.t==='move') { play(d.i, mySym==='X'?'O':'X'); }
                if(d.t==='emo') showEmoji(d.e, mySym==='X'?'O':'X');
                if(d.t==='reset') resetLocal();
                if(d.t==='ping') conn.send({t:'pong'});
                if(d.t==='pong') { lastPong=Date.now(); document.getElementById('alertaWifi').style.display='none'; }
                if(d.t==='left') opponentFled();
                if(d.t==='req_glb') {
                    nX=d.n; nO=document.getElementById('nOG').value; conn.send({t:'acc_glb', n:nO});
                    isOnline=true; mySym="X"; isGlb=false; iniciarJogo('online');
                }
                if(d.t==='acc_glb') { nX=d.n; nO=document.getElementById('nOG').value; isOnline=true; mySym="O"; isGlb=false; iniciarJogo('online'); }
            });
        }

        function opponentFled() {
            active=false; somVitoria();
            let seg = 5; let st = document.getElementById('status');
            st.innerText = "FUGIU! VITÓRIA EM " + seg + "...";
            st.style.color = "var(--neon-green)";
            let cd = setInterval(() => { seg--; if(seg <= 0) { clearInterval(cd); sairPartida(); } else { st.innerText = "FUGIU! VITÓRIA EM " + seg + "..."; } }, 1000);
        }

        function sendEmoji(e) { showEmoji(e, mySym); if(isOnline) conn.send({t:'emo', e:e}); }
        function showEmoji(e, s) {
            let d = document.createElement('div'); d.innerText=e; d.className='reacao-flutuante';
            let cont = s==='X'?document.querySelector('.x-player'):document.querySelector('.o-player');
            cont.appendChild(d); setTimeout(()=>d.remove(),2000);
        }

        function startLocal() { nX=document.getElementById('nLX').value; nO=document.getElementById('nLO').value; if(!nX||!nO){document.getElementById('errL').style.display='block';return;} iniciarJogo('local'); }
        function startIA(d) { nX=document.getElementById('nameIA').value.trim(); if(!nX){document.getElementById('errIA').style.display='block';return;} localStorage.setItem('nickTicTac', nX); nO="MÁQUINA"; diffIA=d; isIA=true; iniciarJogo('ia'); }
        function abrirGlobal() { let n=document.getElementById('nOG').value.trim(); if(!n){document.getElementById('errOG').style.display='block';return;} localStorage.setItem('nickTicTac', n); isGlb=true; show('global'); searchGlb(); }
        function searchGlb() { let temp = peer.connect("NeonGlb_1"); temp.on('open', () => { conn=temp; conn.send({t:'req_glb', n:document.getElementById('nOG').value}); setupConn(); }); }
        function abrirAmigo() { let n=document.getElementById('nOG').value.trim(); if(!n){document.getElementById('errOG').style.display='block';return;} localStorage.setItem('nickTicTac', n); show('onlineAmigo'); }
        function conectarAmigo() { let id=document.getElementById('idAmigo').value; if(!id)return; conn=peer.connect(id); conn.on('open', ()=>{ conn.send({t:'req', n:document.getElementById('nOG').value}); setupConn(); document.getElementById('btnConn').innerText="Aguardando..."; }); }
        function aceitarConvite() { document.getElementById('modalConvite').style.display='none'; nO=document.getElementById('nOG').value||"Player"; conn.send({t:'acc', n:nO}); isOnline=true; mySym="O"; iniciarJogo('online'); }
        function cancelarGlobal() { isGlb=false; peer.destroy(); setTimeout(()=>initPeer(Math.floor(10000+Math.random()*89999).toString()),500); show('onlineMenu'); }

        function iniciarJogo(m) {
            bgMusic.pause(); document.getElementById('btnAudio').style.display='none';
            if(m==='online') { document.getElementById('btnMic').style.display='flex'; document.getElementById('btnMutarAmigo').style.display='flex'; document.getElementById('barraReacoes').style.display='flex'; lastPong=Date.now(); heartbeat=setInterval(()=>{ if(conn&&conn.open)conn.send({t:'ping'}); if(Date.now()-lastPong>10000)opponentFled(); },2000); }
            document.getElementById('telaInicial').style.display='none'; document.getElementById('telaJogo').style.display='flex';
            document.getElementById('txX').innerText=nX; document.getElementById('txO').innerText=nO;
            updateStatus(); if(isIA && cur==='O') aiPlay();
        }

        function sairPartida() { if(conn)conn.send({t:'left'}); clearInterval(heartbeat); location.reload(); }

        document.querySelectorAll('.celula').forEach(c => c.addEventListener('click', e => {
            let i=e.target.dataset.index;
            if(state[i]||!active||(isOnline && mySym!==cur)||(isIA && cur==='O')) return;
            play(i, cur);
            if(isOnline) conn.send({t:'move', i:i});
            else { cur=cur==='X'?'O':'X'; updateStatus(); if(isIA && active) aiPlay(); }
        }));

        function play(i, s) { som(600,0.1); state[i]=s; let el=document.querySelectorAll('.celula')[i]; el.innerText=s; el.classList.add(s==='X'?'x-player':'o-player'); check(); }

        function aiPlay() {
            document.getElementById('status').innerText="MÁQUINA PENSANDO...";
            setTimeout(() => {
                let idx;
                if(diffIA==='noob') { let av=state.map((v,i)=>v===""?i:null).filter(v=>v!==null); idx=av[Math.floor(Math.random()*av.length)]; }
                else idx = minimax(state, 'O').index;
                play(idx, 'O'); cur='X'; updateStatus();
            }, 600);
        }

        function minimax(st, p) {
            let v=checkWin(st); if(v==='X') return {score:-10}; if(v==='O') return {score:10}; if(!st.includes("")) return {score:0};
            let moves=[];
            for(let i=0;i<9;i++) { if(st[i]===""){ let m={index:i}; st[i]=p; m.score=minimax(st, p==='O'?'X':'O').score; st[i]=""; moves.push(m); } }
            return moves.sort((a,b)=> p==='O'? b.score-a.score : a.score-b.score)[0];
        }

        function checkWin(b) {
            const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let p of w) if(b[p[0]]&&b[p[0]]===b[p[1]]&&b[p[0]]===b[p[2]]) return b[p[0]];
            return null;
        }

        function check() {
            let v=checkWin(state);
            if(v) { active=false; somVitoria(); document.getElementById('status').innerText=(v==='X'?nX:nO)+" VENCEU!"; v==='X'?pX++:pO++; document.getElementById('sX').innerText=pX; document.getElementById('sO').innerText=pO; document.getElementById('board').classList.add(v==='X'?'board-win-x':'board-win-o'); document.getElementById('btnNew').style.display='block'; }
            else if(!state.includes("")) { active=false; document.getElementById('status').innerText="EMPATE!"; document.getElementById('board').classList.add('shake-empate'); document.getElementById('btnNew').style.display='block'; }
        }

        function reset() { if(isOnline) conn.send({t:'reset'}); resetLocal(); }
        function resetLocal() { state.fill(""); active=true; startP=startP==="X"?"O":"X"; cur=startP; document.querySelectorAll('.celula').forEach(c => { c.innerText=""; c.className="celula"; }); document.getElementById('board').className='tabuleiro'; document.getElementById('btnNew').style.display='none'; updateStatus(); if(isIA && cur==='O') aiPlay(); }
        function updateStatus() { if(active) document.getElementById('status').innerText=isOnline?(mySym===cur?"SUA VEZ!":"AGUARDE..."):"VEZ DE "+(cur==='X'?nX:nO); }
        function show(m) { document.getElementById('botoesMenu').style.display='none'; ['setupLocal','setupOnlineMenu','setupOnlineAmigo','setupGlobal','setupIA'].forEach(id=>document.getElementById(id).style.display='none'); document.getElementById('setup'+m.charAt(0).toUpperCase()+m.slice(1)).style.display='flex'; }
        function voltarMenu() { location.reload(); }
        function back() { location.reload(); }
    </script>
</body>
</html>
