<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo da Velha</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --primary: #6200ee; --secondary: #10b981; --danger: #f43f5e; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at top, #1e2030 0%, var(--bg) 100%);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; height: 100svh; overflow: hidden;
        }
        #telaInicial { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; text-align: center; }
        #telaJogo { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .logo { font-size: 3rem; font-weight: 900; margin-bottom: 2px; letter-spacing: -2px; }
        .sub { color: #666; font-size: 0.8rem; margin-bottom: 40px; letter-spacing: 2px; text-transform: uppercase; }
        #botoesMenu { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .btn-menu { width: 280px; padding: 18px; margin: 10px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn-local { background: #fff; color: #000; }
        .btn-online { background: var(--primary); color: white; }
        .input-nome { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 16px; border-radius: 12px; width: 280px; text-align: center; font-size: 1rem; outline: none; margin-bottom: 12px; }
        #setupOnline, #setupLocal { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .credito-footer { position: absolute; bottom: 40px; font-size: 0.7rem; color: #333; letter-spacing: 1px; }
        .placar { display: flex; gap: 20px; margin-bottom: 30px; background: rgba(255,255,255,0.02); padding: 12px 25px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.05); }
        .tabuleiro { display: grid; grid-template-columns: repeat(3, 90px); gap: 12px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 25px; }
        .celula { width: 90px; height: 90px; background: rgba(255, 255, 255, 0.03); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; }
        .x-player { color: var(--danger); text-shadow: 0 0 15px var(--danger); }
        .o-player { color: var(--secondary); text-shadow: 0 0 15px var(--secondary); }
        #status { margin-top: 30px; font-weight: bold; font-size: 1rem; color: #888; }
        .btn-acao { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 12px; margin-top: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="telaInicial">
        <div class="logo">Jogo da Velha</div>
        <div class="sub">Multiplayer</div>
        <div id="botoesMenu">
            <button class="btn-menu btn-local" onclick="mostrarSetup('local')">Duelo Local</button>
            <button class="btn-menu btn-online" onclick="mostrarSetup('online')">Jogar Online</button>
        </div>
        <div id="setupLocal">
            <input type="text" id="nomeLocalX" class="input-nome" placeholder="Jogador X" maxlength="10">
            <input type="text" id="nomeLocalO" class="input-nome" placeholder="Jogador O" maxlength="10">
            <button class="btn-menu btn-local" onclick="iniciarJogo('local')">Começar Partida</button>
            <button style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer;" onclick="voltarMenu()">Voltar</button>
        </div>
        <div id="setupOnline">
            <input type="text" id="nomeOnlineEu" class="input-nome" placeholder="Seu apelido" maxlength="10">
            <p style="font-size: 0.7rem; color: #555; margin-bottom: 15px;">SEU ID: <span id="meuId" style="color:var(--secondary)">...</span></p>
            <input type="number" id="idAmigo" class="input-nome" placeholder="ID do Amigo" inputmode="numeric" pattern="[0-9]*">
            <button id="btnConectar" class="btn-menu btn-online" onclick="conectar()">Conectar</button>
            <p id="erroOnline" style="color:var(--danger); font-size:0.7rem; margin-top:10px; display:none;">Código inexistente!</p>
            <button style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer;" onclick="voltarMenu()">Voltar</button>
        </div>
        <div class="credito-footer">DESENVOLVIDO POR THALISONDEV</div>
    </div>
    <div id="telaJogo">
        <div class="placar">
            <div class="x-player"><span id="txtNomeX">X</span>: <span id="sX">0</span></div>
            <div class="o-player"><span id="txtNomeO">O</span>: <span id="sO">0</span></div>
        </div>
        <div class="tabuleiro" id="tabuleiro">
            <div class="celula" data-index="0"></div><div class="celula" data-index="1"></div><div class="celula" data-index="2"></div>
            <div class="celula" data-index="3"></div><div class="celula" data-index="4"></div><div class="celula" data-index="5"></div>
            <div class="celula" data-index="6"></div><div class="celula" data-index="7"></div><div class="celula" data-index="8"></div>
        </div>
        <div id="status">Sua Vez</div>
        <button id="btnNovaPartida" class="btn-acao" style="display:none;" onclick="reset()">Nova Partida</button>
        <button style="background:none; border:none; color:#333; margin-top:20px; font-size: 0.8rem; cursor:pointer;" onclick="location.reload()">Sair</button>
    </div>

    <script>
        const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
        function som(f, d) { try { const o = ctxAudio.createOscillator(); const g = ctxAudio.createGain(); o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.0001, ctxAudio.currentTime + d); o.connect(g); g.connect(ctxAudio.destination); o.start(); o.stop(ctxAudio.currentTime + d); } catch(e){} }
        let nomeX = "X", nomeO = "O", jAtual = "X", ativo = true, estado = ["","","","","","","","",""];
        let pX = 0, pO = 0, online = false, minhaVez = true, meuSimbolo = "X", conn;

        const peer = new Peer(Math.floor(10000 + Math.random() * 89999).toString());
        peer.on('open', id => document.getElementById('meuId').innerText = id);
        peer.on('connection', c => { conn = c; online = true; meuSimbolo = "X"; minhaVez = true; setupConn(); iniciarJogo('online'); });

        function mostrarSetup(m) {
            document.getElementById('botoesMenu').style.display = 'none';
            document.getElementById(m === 'local' ? 'setupLocal' : 'setupOnline').style.display = 'flex';
        }
        function voltarMenu() {
            document.getElementById('botoesMenu').style.display = 'flex';
            document.getElementById('setupLocal').style.display = 'none';
            document.getElementById('setupOnline').style.display = 'none';
            document.getElementById('erroOnline').style.display = 'none';
        }
        function iniciarJogo(m) {
            if(m === 'local') {
                nomeX = document.getElementById('nomeLocalX').value || "X";
                nomeO = document.getElementById('nomeLocalO').value || "O";
                online = false;
            }
            document.getElementById('telaInicial').style.display = 'none';
            document.getElementById('telaJogo').style.display = 'flex';
            document.getElementById('txtNomeX').innerText = nomeX;
            document.getElementById('txtNomeO').innerText = nomeO;
            atualizarStatus();
        }
        function conectar() {
            const id = document.getElementById('idAmigo').value;
            const btn = document.getElementById('btnConectar');
            const erro = document.getElementById('erroOnline');
            if(!id) return;
            btn.innerText = "Verificando...";
            erro.style.display = 'none';
            
            // Tenta conectar; se falhar em 5s, o ID é dado como inexistente
            conn = peer.connect(id);
            const timeout = setTimeout(() => {
                btn.innerText = "Conectar";
                erro.innerText = "Código inexistente!";
                erro.style.display = 'block';
            }, 5000);

            conn.on('open', () => {
                clearTimeout(timeout);
                btn.innerText = "Conectar";
                online = true; meuSimbolo = "O"; minhaVez = false;
                setupConn();
                iniciarJogo('online');
            });
            conn.on('error', () => {
                clearTimeout(timeout);
                btn.innerText = "Conectar";
                erro.style.display = 'block';
            });
        }
        function setupConn() {
            conn.on('data', d => {
                if(d.t === 'j') { marcar(d.i, meuSimbolo === 'X' ? 'O' : 'X'); minhaVez = true; atualizarStatus(); }
                if(d.t === 'r') resetLocal();
            });
        }
        document.querySelectorAll('.celula').forEach(c => c.addEventListener('click', e => {
            const i = e.target.dataset.index;
            if(estado[i] !== "" || !ativo || (online && !minhaVez)) return;
            marcar(i, online ? meuSimbolo : jAtual);
            if(online) { conn.send({t:'j', i:i}); minhaVez = false; atualizarStatus(); }
            else { jAtual = jAtual === 'X' ? 'O' : 'X'; atualizarStatus(); }
        }));
        function marcar(i, s) {
            som(600, 0.1);
            estado[i] = s;
            const el = document.querySelectorAll('.celula')[i];
            el.innerText = s; el.classList.add(s === 'X' ? 'x-player' : 'o-player');
            checar();
        }
        function atualizarStatus() {
            if(!ativo) return;
            const s = document.getElementById('status');
            if(online) s.innerText = minhaVez ? "SUA VEZ!" : "AGUARDE...";
            else s.innerText = `VEZ DE ${jAtual === 'X' ? nomeX : nomeO}`;
        }
        function checar() {
            const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let p of w) {
                if(estado[p[0]] && estado[p[0]] === estado[p[1]] && estado[p[0]] === estado[p[2]]) {
                    ativo = false; confetti();
                    document.getElementById('status').innerText = `${estado[p[0]]} VENCEU!`;
                    estado[p[0]] === 'X' ? pX++ : pO++;
                    document.getElementById('sX').innerText = pX; document.getElementById('sO').innerText = pO;
                    if(!online) document.getElementById('btnNovaPartida').style.display = 'block';
                    return;
                }
            }
            if(!estado.includes("")) { document.getElementById('status').innerText = "EMPATE!"; ativo = false; if(!online) document.getElementById('btnNovaPartida').style.display = 'block'; }
        }
        function reset() { if(online) return; resetLocal(); }
        function resetLocal() {
            estado.fill(""); ativo = true; jAtual = "X";
            document.querySelectorAll('.celula').forEach(c => { c.innerText = ""; c.className = "celula"; });
            document.getElementById('btnNovaPartida').style.display = 'none';
            atualizarStatus();
        }
    </script>
</body>
</html>
